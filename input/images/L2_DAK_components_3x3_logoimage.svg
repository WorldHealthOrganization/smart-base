<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="980" viewBox="0 0 1600 980">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#000000" flood-opacity="0.14"/>
    </filter>
    <style>
      .title { font-family: Arial, Helvetica, sans-serif; font-size: 52px; font-weight: 700; fill: #113a7a; }
      .cardTitle { font-family: Arial, Helvetica, sans-serif; font-size: 22px; font-weight: 700; fill: #ffffff; }
      .bodyText { font-family: Arial, Helvetica, sans-serif; font-size: 18px; font-weight: 500; fill: #0b1b2b; }
      .numText { font-family: Arial, Helvetica, sans-serif; font-size: 18px; font-weight: 800; fill: #ffffff; }
      .footerText { font-family: Arial, Helvetica, sans-serif; font-size: 18px; font-weight: 700; fill: #1177cc; }
    </style>
  </defs>

  <rect x="0" y="0" width="1600" height="980" fill="#ffffff"/>
  <line x1="60" y1="40" x2="1540" y2="40" stroke="#113a7a" stroke-width="4"/>
  <text x="60" y="98" class="title">Components of a L2 Digital Adaptation Kit (DAK)</text>

  <g filter="url(#shadow)">
    <rect x="60.0" y="140.0" width="466.6666666666667" height="225.0" rx="10" ry="10" fill="#d7e6ff"/>
    <rect x="60.0" y="140.0" width="466.6666666666667" height="80" rx="10" ry="10" fill="#0b2a5b"/>
    <rect x="58.0" y="138.0" width="30" height="30" rx="2" ry="2" fill="#000000"/>
    <text x="73.0" y="160.0" text-anchor="middle" class="numText">1</text>
  </g>
  <text x="293.33333333333337" y="172.0" text-anchor="middle" class="cardTitle"><tspan x="293.33333333333337">Health Interventions &amp;</tspan><tspan x="293.33333333333337" dy="25">Recommendations</tspan></text>
  <text x="78.0" y="254.0" class="bodyText"><tspan x="78.0">Relevant health interventions and</tspan><tspan x="78.0" dy="22">recommendations from the WHO guideline and</tspan><tspan x="78.0" dy="22">guidance</tspan></text>

  <g filter="url(#shadow)">
    <rect x="566.6666666666667" y="140.0" width="466.6666666666667" height="225.0" rx="10" ry="10" fill="#d6f1ff"/>
    <rect x="566.6666666666667" y="140.0" width="466.6666666666667" height="80" rx="10" ry="10" fill="#1596cf"/>
    <rect x="564.6666666666667" y="138.0" width="30" height="30" rx="2" ry="2" fill="#000000"/>
    <text x="579.6666666666667" y="160.0" text-anchor="middle" class="numText">2</text>
  </g>
  <text x="800.0000000000001" y="174.0" text-anchor="middle" class="cardTitle">Generic Personas</text>
  <text x="584.6666666666667" y="254.0" class="bodyText"><tspan x="584.6666666666667">Roles, responsibilities, and essential</tspan><tspan x="584.6666666666667" dy="22">interventions performed by targeted</tspan><tspan x="584.6666666666667" dy="22">personas</tspan></text>

  <g filter="url(#shadow)">
    <rect x="1073.3333333333335" y="140.0" width="466.6666666666667" height="225.0" rx="10" ry="10" fill="#ffe2d6"/>
    <rect x="1073.3333333333335" y="140.0" width="466.6666666666667" height="80" rx="10" ry="10" fill="#ef6c2f"/>
    <rect x="1071.3333333333335" y="138.0" width="30" height="30" rx="2" ry="2" fill="#000000"/>
    <text x="1086.3333333333335" y="160.0" text-anchor="middle" class="numText">3</text>
  </g>
  <text x="1306.6666666666667" y="174.0" text-anchor="middle" class="cardTitle">User Scenarios</text>
  <text x="1091.3333333333335" y="254.0" class="bodyText"><tspan x="1091.3333333333335">Brief narrative description of how the</tspan><tspan x="1091.3333333333335" dy="22">targeted personas may engage with the</tspan><tspan x="1091.3333333333335" dy="22">digital system</tspan></text>

  <g filter="url(#shadow)">
    <rect x="60.0" y="405.0" width="466.6666666666667" height="225.0" rx="10" ry="10" fill="#fff1d3"/>
    <rect x="60.0" y="405.0" width="466.6666666666667" height="80" rx="10" ry="10" fill="#f0a11f"/>
    <rect x="58.0" y="403.0" width="30" height="30" rx="2" ry="2" fill="#000000"/>
    <text x="73.0" y="425.0" text-anchor="middle" class="numText">4</text>
  </g>
  <text x="293.33333333333337" y="437.0" text-anchor="middle" class="cardTitle"><tspan x="293.33333333333337">Business Processes &amp;</tspan><tspan x="293.33333333333337" dy="25">Workflows</tspan></text>
  <text x="78.0" y="519.0" class="bodyText"><tspan x="78.0">Generic workflows representing clinical and</tspan><tspan x="78.0" dy="22">non-clinical processes</tspan></text>

  <g filter="url(#shadow)">
    <rect x="566.6666666666667" y="405.0" width="466.6666666666667" height="225.0" rx="10" ry="10" fill="#f8d6f3"/>
    <rect x="566.6666666666667" y="405.0" width="466.6666666666667" height="80" rx="10" ry="10" fill="#9a2a8d"/>
    <rect x="564.6666666666667" y="403.0" width="30" height="30" rx="2" ry="2" fill="#000000"/>
    <text x="579.6666666666667" y="425.0" text-anchor="middle" class="numText">5</text>
  </g>
  <text x="800.0000000000001" y="439.0" text-anchor="middle" class="cardTitle">Core Data Elements</text>
  <text x="584.6666666666667" y="519.0" class="bodyText"><tspan x="584.6666666666667">Data elements, used for clinical</tspan><tspan x="584.6666666666667" dy="22">decision-making, indicators, and other data</tspan><tspan x="584.6666666666667" dy="22">needs</tspan></text>

  <g filter="url(#shadow)">
    <rect x="1073.3333333333335" y="405.0" width="466.6666666666667" height="225.0" rx="10" ry="10" fill="#e8dbff"/>
    <rect x="1073.3333333333335" y="405.0" width="466.6666666666667" height="80" rx="10" ry="10" fill="#4b2a7b"/>
    <rect x="1071.3333333333335" y="403.0" width="30" height="30" rx="2" ry="2" fill="#000000"/>
    <text x="1086.3333333333335" y="425.0" text-anchor="middle" class="numText">6</text>
  </g>
  <text x="1306.6666666666667" y="439.0" text-anchor="middle" class="cardTitle">Decision Support Logic</text>
  <text x="1091.3333333333335" y="519.0" class="bodyText"><tspan x="1091.3333333333335">Decision tables representing counselling</tspan><tspan x="1091.3333333333335" dy="22">and treatment algorithms, scheduling logic</tspan></text>

  <g filter="url(#shadow)">
    <rect x="60.0" y="670.0" width="466.6666666666667" height="225.0" rx="10" ry="10" fill="#e0f4d5"/>
    <rect x="60.0" y="670.0" width="466.6666666666667" height="80" rx="10" ry="10" fill="#77b255"/>
    <rect x="58.0" y="668.0" width="30" height="30" rx="2" ry="2" fill="#000000"/>
    <text x="73.0" y="690.0" text-anchor="middle" class="numText">7</text>
  </g>
  <text x="293.33333333333337" y="704.0" text-anchor="middle" class="cardTitle">Indicators &amp; Monitoring</text>
  <text x="78.0" y="784.0" class="bodyText"><tspan x="78.0">Indicators for reporting &amp; monitoring with</tspan><tspan x="78.0" dy="22">numerator, denominator of data elements</tspan></text>

  <g filter="url(#shadow)">
    <rect x="566.6666666666667" y="670.0" width="466.6666666666667" height="225.0" rx="10" ry="10" fill="#ededed"/>
    <rect x="566.6666666666667" y="670.0" width="466.6666666666667" height="80" rx="10" ry="10" fill="#6f6f6f"/>
    <rect x="564.6666666666667" y="668.0" width="30" height="30" rx="2" ry="2" fill="#000000"/>
    <text x="579.6666666666667" y="690.0" text-anchor="middle" class="numText">8</text>
  </g>
  <text x="800.0000000000001" y="702.0" text-anchor="middle" class="cardTitle"><tspan x="800.0000000000001">Functional &amp; Non-functional</tspan><tspan x="800.0000000000001" dy="25">Requirements</tspan></text>
  <text x="584.6666666666667" y="784.0" class="bodyText"><tspan x="584.6666666666667">A non-exhaustive list of key functions</tspan><tspan x="584.6666666666667" dy="22">and non-functional requirements for a</tspan><tspan x="584.6666666666667" dy="22">digital tracking and decision support</tspan><tspan x="584.6666666666667" dy="22">system</tspan></text>

  <g filter="url(#shadow)">
    <rect x="1073.3333333333335" y="670.0" width="466.6666666666667" height="225.0" rx="10" ry="10" fill="#d6ecff"/>
    <rect x="1073.3333333333335" y="670.0" width="466.6666666666667" height="80" rx="10" ry="10" fill="#1177cc"/>
    <rect x="1071.3333333333335" y="668.0" width="30" height="30" rx="2" ry="2" fill="#000000"/>
    <text x="1086.3333333333335" y="690.0" text-anchor="middle" class="numText">9</text>
  </g>
  <text x="1306.6666666666667" y="704.0" text-anchor="middle" class="cardTitle">Test Scenarios</text>
  <text x="1091.3333333333335" y="784.0" class="bodyText"><tspan x="1091.3333333333335">Verify that digital systems correctly</tspan><tspan x="1091.3333333333335" dy="22">interpret and implement WHO clinical</tspan><tspan x="1091.3333333333335" dy="22">guidelines.</tspan></text>
  <image x="60" y="922" width="45" height="40" href="data:image/png;base64,"/>
  <text x="119" y="949" class="footerText">World Health Organization</text>
</svg>
