<?xml version="1.0" encoding="UTF-8" standalone="no"?>
<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="980" viewBox="0 0 1600 980">
  <defs>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="3" stdDeviation="5" flood-color="#000000" flood-opacity="0.14"/>
    </filter>
    <style>
      .title { font-family: Arial, Helvetica, sans-serif; font-size: 52px; font-weight: 700; fill: #113a7a; }
      .cardTitle { font-family: Arial, Helvetica, sans-serif; font-size: 22px; font-weight: 700; fill: #ffffff; }
      .bodyText { font-family: Arial, Helvetica, sans-serif; font-size: 18px; font-weight: 500; fill: #0b1b2b; }
      .numText { font-family: Arial, Helvetica, sans-serif; font-size: 18px; font-weight: 800; fill: #ffffff; }
      .footerText { font-family: Arial, Helvetica, sans-serif; font-size: 18px; font-weight: 700; fill: #1177cc; }
      /* Card title div inside foreignObject */
      .dak-card-title {
        font-family: Arial, Helvetica, sans-serif;
        font-size: 22px;
        font-weight: 700;
        color: #ffffff;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
        height: 100%;
        line-height: 1.2;
      }
      /* Card body div inside foreignObject */
      .dak-card-body {
        font-family: Arial, Helvetica, sans-serif;
        font-size: 18px;
        font-weight: 500;
        color: #0b1b2b;
        line-height: 1.4;
        overflow: hidden;
      }
    </style>
  </defs>

  <rect x="0" y="0" width="1600" height="980" fill="#ffffff"/>
  <line x1="60" y1="40" x2="1540" y2="40" stroke="#113a7a" stroke-width="4"/>
  <text x="60" y="98" class="title">Components of a L2 Digital Adaptation Kit (DAK)</text>

  <g filter="url(#shadow)">
    <rect x="60.0" y="140.0" width="466.6666666666667" height="225.0" rx="10" ry="10" fill="#d7e6ff"/>
    <rect x="60.0" y="140.0" width="466.6666666666667" height="80" rx="10" ry="10" fill="#0b2a5b"/>
    <rect x="58.0" y="138.0" width="30" height="30" rx="2" ry="2" fill="#000000"/>
    <text x="73.0" y="160.0" text-anchor="middle" class="numText">1</text>
  </g>
  <foreignObject x="65" y="145" width="456" height="70">
    <div xmlns="http://www.w3.org/1999/xhtml" class="dak-card-title">Health Interventions &amp; Recommendations</div>
  </foreignObject>
  <foreignObject x="75" y="225" width="435" height="132">
    <div xmlns="http://www.w3.org/1999/xhtml" class="dak-card-body">Relevant health interventions and recommendations from the WHO guideline and guidance</div>
  </foreignObject>

  <g filter="url(#shadow)">
    <rect x="566.6666666666667" y="140.0" width="466.6666666666667" height="225.0" rx="10" ry="10" fill="#d6f1ff"/>
    <rect x="566.6666666666667" y="140.0" width="466.6666666666667" height="80" rx="10" ry="10" fill="#1596cf"/>
    <rect x="564.6666666666667" y="138.0" width="30" height="30" rx="2" ry="2" fill="#000000"/>
    <text x="579.6666666666667" y="160.0" text-anchor="middle" class="numText">2</text>
  </g>
  <foreignObject x="571" y="145" width="456" height="70">
    <div xmlns="http://www.w3.org/1999/xhtml" class="dak-card-title">Generic Personas</div>
  </foreignObject>
  <foreignObject x="581" y="225" width="435" height="132">
    <div xmlns="http://www.w3.org/1999/xhtml" class="dak-card-body">Roles, responsibilities, and essential interventions performed by targeted personas</div>
  </foreignObject>

  <g filter="url(#shadow)">
    <rect x="1073.3333333333335" y="140.0" width="466.6666666666667" height="225.0" rx="10" ry="10" fill="#ffe2d6"/>
    <rect x="1073.3333333333335" y="140.0" width="466.6666666666667" height="80" rx="10" ry="10" fill="#ef6c2f"/>
    <rect x="1071.3333333333335" y="138.0" width="30" height="30" rx="2" ry="2" fill="#000000"/>
    <text x="1086.3333333333335" y="160.0" text-anchor="middle" class="numText">3</text>
  </g>
  <foreignObject x="1078" y="145" width="456" height="70">
    <div xmlns="http://www.w3.org/1999/xhtml" class="dak-card-title">User Scenarios</div>
  </foreignObject>
  <foreignObject x="1088" y="225" width="435" height="132">
    <div xmlns="http://www.w3.org/1999/xhtml" class="dak-card-body">Brief narrative description of how the targeted personas may engage with the digital system</div>
  </foreignObject>

  <g filter="url(#shadow)">
    <rect x="60.0" y="405.0" width="466.6666666666667" height="225.0" rx="10" ry="10" fill="#fff1d3"/>
    <rect x="60.0" y="405.0" width="466.6666666666667" height="80" rx="10" ry="10" fill="#f0a11f"/>
    <rect x="58.0" y="403.0" width="30" height="30" rx="2" ry="2" fill="#000000"/>
    <text x="73.0" y="425.0" text-anchor="middle" class="numText">4</text>
  </g>
  <foreignObject x="65" y="410" width="456" height="70">
    <div xmlns="http://www.w3.org/1999/xhtml" class="dak-card-title">Business Processes &amp; Workflows</div>
  </foreignObject>
  <foreignObject x="75" y="490" width="435" height="132">
    <div xmlns="http://www.w3.org/1999/xhtml" class="dak-card-body">Generic workflows representing clinical and non-clinical processes</div>
  </foreignObject>

  <g filter="url(#shadow)">
    <rect x="566.6666666666667" y="405.0" width="466.6666666666667" height="225.0" rx="10" ry="10" fill="#f8d6f3"/>
    <rect x="566.6666666666667" y="405.0" width="466.6666666666667" height="80" rx="10" ry="10" fill="#9a2a8d"/>
    <rect x="564.6666666666667" y="403.0" width="30" height="30" rx="2" ry="2" fill="#000000"/>
    <text x="579.6666666666667" y="425.0" text-anchor="middle" class="numText">5</text>
  </g>
  <foreignObject x="571" y="410" width="456" height="70">
    <div xmlns="http://www.w3.org/1999/xhtml" class="dak-card-title">Core Data Elements</div>
  </foreignObject>
  <foreignObject x="581" y="490" width="435" height="132">
    <div xmlns="http://www.w3.org/1999/xhtml" class="dak-card-body">Data elements, used for clinical decision-making, indicators, and other data needs</div>
  </foreignObject>

  <g filter="url(#shadow)">
    <rect x="1073.3333333333335" y="405.0" width="466.6666666666667" height="225.0" rx="10" ry="10" fill="#e8dbff"/>
    <rect x="1073.3333333333335" y="405.0" width="466.6666666666667" height="80" rx="10" ry="10" fill="#4b2a7b"/>
    <rect x="1071.3333333333335" y="403.0" width="30" height="30" rx="2" ry="2" fill="#000000"/>
    <text x="1086.3333333333335" y="425.0" text-anchor="middle" class="numText">6</text>
  </g>
  <foreignObject x="1078" y="410" width="456" height="70">
    <div xmlns="http://www.w3.org/1999/xhtml" class="dak-card-title">Decision Support Logic</div>
  </foreignObject>
  <foreignObject x="1088" y="490" width="435" height="132">
    <div xmlns="http://www.w3.org/1999/xhtml" class="dak-card-body">Decision tables representing counselling and treatment algorithms, scheduling logic</div>
  </foreignObject>

  <g filter="url(#shadow)">
    <rect x="60.0" y="670.0" width="466.6666666666667" height="225.0" rx="10" ry="10" fill="#e0f4d5"/>
    <rect x="60.0" y="670.0" width="466.6666666666667" height="80" rx="10" ry="10" fill="#77b255"/>
    <rect x="58.0" y="668.0" width="30" height="30" rx="2" ry="2" fill="#000000"/>
    <text x="73.0" y="690.0" text-anchor="middle" class="numText">7</text>
  </g>
  <foreignObject x="65" y="675" width="456" height="70">
    <div xmlns="http://www.w3.org/1999/xhtml" class="dak-card-title">Indicators &amp; Monitoring</div>
  </foreignObject>
  <foreignObject x="75" y="755" width="435" height="132">
    <div xmlns="http://www.w3.org/1999/xhtml" class="dak-card-body">Indicators for reporting &amp; monitoring with numerator, denominator of data elements</div>
  </foreignObject>

  <g filter="url(#shadow)">
    <rect x="566.6666666666667" y="670.0" width="466.6666666666667" height="225.0" rx="10" ry="10" fill="#ededed"/>
    <rect x="566.6666666666667" y="670.0" width="466.6666666666667" height="80" rx="10" ry="10" fill="#6f6f6f"/>
    <rect x="564.6666666666667" y="668.0" width="30" height="30" rx="2" ry="2" fill="#000000"/>
    <text x="579.6666666666667" y="690.0" text-anchor="middle" class="numText">8</text>
  </g>
  <foreignObject x="571" y="675" width="456" height="70">
    <div xmlns="http://www.w3.org/1999/xhtml" class="dak-card-title">Functional &amp; Non-functional Requirements</div>
  </foreignObject>
  <foreignObject x="581" y="755" width="435" height="132">
    <div xmlns="http://www.w3.org/1999/xhtml" class="dak-card-body">A non-exhaustive list of key functions and non-functional requirements for a digital tracking and decision support system</div>
  </foreignObject>

  <g filter="url(#shadow)">
    <rect x="1073.3333333333335" y="670.0" width="466.6666666666667" height="225.0" rx="10" ry="10" fill="#d6ecff"/>
    <rect x="1073.3333333333335" y="670.0" width="466.6666666666667" height="80" rx="10" ry="10" fill="#1177cc"/>
    <rect x="1071.3333333333335" y="668.0" width="30" height="30" rx="2" ry="2" fill="#000000"/>
    <text x="1086.3333333333335" y="690.0" text-anchor="middle" class="numText">9</text>
  </g>
  <foreignObject x="1078" y="675" width="456" height="70">
    <div xmlns="http://www.w3.org/1999/xhtml" class="dak-card-title">Test Scenarios</div>
  </foreignObject>
  <foreignObject x="1088" y="755" width="435" height="132">
    <div xmlns="http://www.w3.org/1999/xhtml" class="dak-card-body">Verify that digital systems correctly interpret and implement WHO clinical guidelines.</div>
  </foreignObject>
  <image x="60" y="922" width="45" height="40" href="who-logo.png"/>
  <text x="119" y="949" class="footerText">World Health Organization</text>
</svg>
