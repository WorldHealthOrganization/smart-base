openapi: 3.0.3
info:
  title: User Scenario (DAK) API
  description: Logical Model for representing User Scenarios from a DAK. Narratives
    that describe how the different personas may interact with each other.
  version: 1.0.0
paths:
  /UserScenario.schema.json:
    get:
      summary: JSON Schema definition for the Logical Model UserScenario
      description: This endpoint serves the JSON Schema definition for the Logical
        Model UserScenario.
      responses:
        '200':
          description: The JSON Schema for UserScenario
          content:
            application/schema+json:
              schema:
                $ref: ./UserScenario.schema.json
components:
  schemas:
    UserScenario:
      $schema: https://json-schema.org/draft/2020-12/schema
      $id: http://smart.who.int/base/StructureDefinition/UserScenario.schema.json
      title: User Scenario (DAK)
      description: Logical Model for representing User Scenarios from a DAK. Narratives
        that describe how the different personas may interact with each other.
      type: object
      properties:
        title:
          type: string
          description: Title of the user scenario
        id:
          type: string
          description: An identifier for the user scenario
        personas:
          type: array
          items:
            type: string
          description: References to persona IDs that participate in this scenario
      required:
      - title
      - id
      fhir:logicalModel: http://smart.who.int/base/StructureDefinition/UserScenario
      fhir:parent: http://hl7.org/fhir/StructureDefinition/Base
