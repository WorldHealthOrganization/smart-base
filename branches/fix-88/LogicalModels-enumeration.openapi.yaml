openapi: 3.0.3
info:
  title: LogicalModels Enumeration API
  description: API endpoint providing an enumeration of all available Logical Model
    schemas
  version: 1.0.0
paths:
  /LogicalModels.schema:
    get:
      summary: Get enumeration of all Logical Model schemas
      description: Returns a list of all available Logical Model schemas with metadata
      responses:
        '200':
          description: Successfully retrieved logical_model enumeration
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/EnumerationResponse'
              example: &id001
                type: logical_model
                count: 14
                schemas:
                - filename: BusinessProcessWorkflow.schema.json
                  id: http://smart.who.int/base/StructureDefinition/BusinessProcessWorkflow.schema.json
                  title: Business Process Workflow (DAK)
                  description: Logical Model for representing Generic Business Processes
                    and Workflows from a DAK. A business process is a set of related
                    activities or tasks performed together to achieve the objectives
                    of the health programme area.
                  url: ./BusinessProcessWorkflow.schema.json
                  logicalModelUrl: http://smart.who.int/base/StructureDefinition/BusinessProcessWorkflow
                  propertyCount: 9
                - filename: FunctionalRequirement.schema.json
                  id: http://smart.who.int/base/StructureDefinition/FunctionalRequirement.schema.json
                  title: Functional Requirement (DAK)
                  description: Logical Model for representing functional requirement
                    from a DAK
                  url: ./FunctionalRequirement.schema.json
                  logicalModelUrl: http://smart.who.int/base/StructureDefinition/FunctionalRequirement
                  propertyCount: 6
                - filename: Requirements.schema.json
                  id: http://smart.who.int/base/StructureDefinition/Requirements.schema.json
                  title: Functional and Non-Functional Requirements (DAK)
                  description: Logical Model for representing Functional and Non-Functional
                    Requirements from a DAK. A high-level list of core functions and
                    capabilities that the system must have to meet the end users'
                    needs.
                  url: ./Requirements.schema.json
                  logicalModelUrl: http://smart.who.int/base/StructureDefinition/Requirements
                  propertyCount: 2
                - filename: DAK.schema.json
                  id: http://smart.who.int/base/StructureDefinition/DAK.schema.json
                  title: Digital Adaptation Kit (DAK)
                  description: Logical Model for representing a complete Digital Adaptation
                    Kit (DAK) with metadata and all 9 DAK components
                  url: ./DAK.schema.json
                  logicalModelUrl: http://smart.who.int/base/StructureDefinition/DAK
                  propertyCount: 15
                - filename: NonFunctionalRequirement.schema.json
                  id: http://smart.who.int/base/StructureDefinition/NonFunctionalRequirement.schema.json
                  title: Non-Functional Requirement (DAK)
                  description: Logical Model for representing non-functional requirement
                    from a DAK
                  url: ./NonFunctionalRequirement.schema.json
                  logicalModelUrl: http://smart.who.int/base/StructureDefinition/NonFunctionalRequirement
                  propertyCount: 4
                - filename: Persona.schema.json
                  id: http://smart.who.int/base/StructureDefinition/Persona.schema.json
                  title: Persona (DAK)
                  description: Logical Model for representing Personas from a DAK
                  url: ./Persona.schema.json
                  logicalModelUrl: http://smart.who.int/base/StructureDefinition/Persona
                  propertyCount: 5
                - filename: DecisionSupportLogic.schema.json
                  id: http://smart.who.int/base/StructureDefinition/DecisionSupportLogic.schema.json
                  title: Decision-Support Logic (DAK)
                  description: Logical Model for representing Decision-Support Logic
                    from a DAK. Decision-support logic and algorithms to support appropriate
                    service delivery in accordance with WHO clinical, public health
                    and data use guidelines.
                  url: ./DecisionSupportLogic.schema.json
                  logicalModelUrl: http://smart.who.int/base/StructureDefinition/DecisionSupportLogic
                  propertyCount: 1
                - filename: ProgramIndicator.schema.json
                  id: http://smart.who.int/base/StructureDefinition/ProgramIndicator.schema.json
                  title: Program Indicator (DAK)
                  description: Logical Model for representing Program Indicators from
                    a DAK. Core set of indicators that need to be aggregated for decision-making,
                    performance metrics and subnational and national reporting.
                  url: ./ProgramIndicator.schema.json
                  logicalModelUrl: http://smart.who.int/base/StructureDefinition/ProgramIndicator
                  propertyCount: 7
                - filename: HealthInterventions.schema.json
                  id: http://smart.who.int/base/StructureDefinition/HealthInterventions.schema.json
                  title: Health Interventions and Recommendations (DAK)
                  description: Logical Model for representing Health Interventions
                    and Recommendations from a DAK. Overview of the health interventions
                    and WHO, regional or national recommendations included within
                    the DAK.
                  url: ./HealthInterventions.schema.json
                  logicalModelUrl: http://smart.who.int/base/StructureDefinition/HealthInterventions
                  propertyCount: 2
                - filename: GenericPersona.schema.json
                  id: http://smart.who.int/base/StructureDefinition/GenericPersona.schema.json
                  title: Generic Persona (DAK)
                  description: Logical Model for representing Generic Personas from
                    a DAK. Depiction of the human and system actors. Human actors
                    are end users, supervisors and related stakeholders who would
                    be interacting with the digital system or involved in the clinical
                    care, public health or health system pathway.
                  url: ./GenericPersona.schema.json
                  logicalModelUrl: http://smart.who.int/base/StructureDefinition/GenericPersona
                  propertyCount: 5
                - filename: DublinCore.schema.json
                  id: http://smart.who.int/base/StructureDefinition/DublinCore.schema.json
                  title: Dublin Core Metadata Element Set
                  description: Logical Model representing Dublin Core metadata elements
                    as defined at https://www.dublincore.org/specifications/dublin-core/dcmi-terms/
                  url: ./DublinCore.schema.json
                  logicalModelUrl: http://smart.who.int/base/StructureDefinition/DublinCore
                  propertyCount: 15
                - filename: CoreDataElement.schema.json
                  id: http://smart.who.int/base/StructureDefinition/CoreDataElement.schema.json
                  title: Core Data Element (DAK)
                  description: Logical Model for representing Core Data Elements from
                    a DAK. Data elements are required throughout the different points
                    of a workflow and are mapped to established concept mapping standards.
                  url: ./CoreDataElement.schema.json
                  logicalModelUrl: http://smart.who.int/base/StructureDefinition/CoreDataElement
                  propertyCount: 3
                - filename: TestScenario.schema.json
                  id: http://smart.who.int/base/StructureDefinition/TestScenario.schema.json
                  title: Test Scenario (DAK)
                  description: Logical Model for representing Test Scenarios from
                    a DAK. A set of test scenarios to validate an implementation of
                    the DAK.
                  url: ./TestScenario.schema.json
                  logicalModelUrl: http://smart.who.int/base/StructureDefinition/TestScenario
                  propertyCount: 1
                - filename: UserScenario.schema.json
                  id: http://smart.who.int/base/StructureDefinition/UserScenario.schema.json
                  title: User Scenario (DAK)
                  description: Logical Model for representing User Scenarios from
                    a DAK. Narratives that describe how the different personas may
                    interact with each other.
                  url: ./UserScenario.schema.json
                  logicalModelUrl: http://smart.who.int/base/StructureDefinition/UserScenario
                  propertyCount: 3
components:
  schemas:
    EnumerationResponse:
      $schema: https://json-schema.org/draft/2020-12/schema
      $id: '#/LogicalModels.schema'
      title: Logical Model Enumeration Schema
      description: JSON Schema defining the structure of the Logical Model enumeration
        endpoint response
      type: object
      properties:
        type:
          type: string
          const: logical_model
          description: The type of schemas enumerated (logical_model)
        count:
          type: integer
          description: Total number of schemas available
        schemas:
          type: array
          description: Array of available schemas
          items:
            type: object
            properties:
              filename:
                type: string
                description: Schema filename
              id:
                type: string
                description: Schema $id
              title:
                type: string
                description: Schema title
              description:
                type: string
                description: Schema description
              url:
                type: string
                description: Relative URL to the schema file
              logicalModelUrl:
                type: string
                description: FHIR canonical URL of the Logical Model
              propertyCount:
                type: integer
                description: Number of properties in the Logical Model
            required:
            - filename
            - title
            - url
      required:
      - type
      - count
      - schemas
      example: *id001
