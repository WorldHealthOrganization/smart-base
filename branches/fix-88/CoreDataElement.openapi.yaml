openapi: 3.0.3
info:
  title: Core Data Element (DAK) API
  description: Logical Model for representing Core Data Elements from a DAK. Data
    elements are required throughout the different points of a workflow and are mapped
    to established concept mapping standards.
  version: 1.0.0
paths:
  /CoreDataElement.schema.json:
    get:
      summary: JSON Schema definition for the Logical Model CoreDataElement
      description: This endpoint serves the JSON Schema definition for the Logical
        Model CoreDataElement.
      responses:
        '200':
          description: The JSON Schema for CoreDataElement
          content:
            application/schema+json:
              schema:
                $ref: ./CoreDataElement.schema.json
components:
  schemas:
    CoreDataElement:
      $schema: https://json-schema.org/draft/2020-12/schema
      $id: http://smart.who.int/base/StructureDefinition/CoreDataElement.schema.json
      title: Core Data Element (DAK)
      description: Logical Model for representing Core Data Elements from a DAK. Data
        elements are required throughout the different points of a workflow and are
        mapped to established concept mapping standards.
      type: object
      properties:
        code:
          type: string
          description: Code that identifies the concept
        display:
          type: string
          description: Text displayed to the user
        definition:
          type: string
          description: Formal definition of the data element
      required:
      - code
      - display
      - definition
      fhir:logicalModel: http://smart.who.int/base/StructureDefinition/CoreDataElement
      fhir:parent: http://hl7.org/fhir/StructureDefinition/Base
