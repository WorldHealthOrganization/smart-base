openapi: 3.0.3
info:
  title: Test Scenario (DAK) API
  description: Logical Model for representing Test Scenarios from a DAK. A set of
    test scenarios to validate an implementation of the DAK.
  version: 1.0.0
paths:
  /TestScenario.schema.json:
    get:
      summary: JSON Schema definition for the Logical Model TestScenario
      description: This endpoint serves the JSON Schema definition for the Logical
        Model TestScenario.
      responses:
        '200':
          description: The JSON Schema for TestScenario
          content:
            application/schema+json:
              schema:
                $ref: ./TestScenario.schema.json
components:
  schemas:
    TestScenario:
      $schema: https://json-schema.org/draft/2020-12/schema
      $id: http://smart.who.int/base/StructureDefinition/TestScenario.schema.json
      title: Test Scenario (DAK)
      description: Logical Model for representing Test Scenarios from a DAK. A set
        of test scenarios to validate an implementation of the DAK.
      type: object
      properties:
        feature:
          type: string
          format: uri
          description: Link to a feature file containing the test scenarios
      required:
      - feature
      fhir:logicalModel: http://smart.who.int/base/StructureDefinition/TestScenario
      fhir:parent: http://hl7.org/fhir/StructureDefinition/Base
