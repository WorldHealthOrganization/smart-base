# Generate a translation completeness report and (optionally) commit it.
#
# Scans all .po files in the repository and produces
# input/pagecontent/translation-status.md showing per-language, per-component
# completion percentages with 🟢/🟡/🔴/⬜ color coding.
#
# Can be called:
#   - As a standalone workflow (workflow_dispatch)
#   - From the CI pipeline after a successful IG build
#   - On a schedule
#
# Inputs:
#   push   When true, commit and push the report to the branch (default: false)

name: Generate Translation Report

on:
  workflow_call:
    inputs:
      push:
        description: 'Commit and push the report to the branch'
        required: false
        type: boolean
        default: false

  workflow_dispatch:
    inputs:
      push:
        description: 'Commit and push the report to the branch'
        required: false
        type: boolean
        default: false

  # Runs nightly after pull_translations (which also runs at 02:00 UTC).
  schedule:
    - cron: '30 2 * * *'   # 02:30 UTC every day

concurrency:
  group: translation-report-${{ github.ref }}
  cancel-in-progress: false

jobs:
  generate-report:
    name: Generate translation completeness report
    runs-on: ubuntu-latest

    permissions:
      contents: write   # required only when push: true

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── Gate on DAK being enabled ─────────────────────────────────────
      - name: Check for DAK configuration
        id: dak_check
        run: |
          if [ -f "dak.json" ]; then
            echo "DAK_ENABLED=true" >> "$GITHUB_OUTPUT"
          else
            echo "DAK_ENABLED=false" >> "$GITHUB_OUTPUT"
            echo "⚠️ dak.json not found — skipping report (DAK not enabled)"
          fi

      - name: Set up Python
        if: steps.dak_check.outputs.DAK_ENABLED == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: input/scripts/requirements.txt

      - name: Install Python dependencies
        if: steps.dak_check.outputs.DAK_ENABLED == 'true'
        run: pip install -r input/scripts/requirements.txt

      - name: Generate translation status report
        if: steps.dak_check.outputs.DAK_ENABLED == 'true'
        run: |
          python input/scripts/translation_report.py \
            --repo-root "." \
            --output    "input/pagecontent/translation-status.md"

      - name: Commit report
        if: >-
          steps.dak_check.outputs.DAK_ENABLED == 'true' &&
          (inputs.push == true || github.event_name == 'schedule')
        env:
          ACTOR: ${{ github.actor }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add input/pagecontent/translation-status.md
          if git diff --cached --quiet; then
            echo "No report changes to commit."
          else
            TIMESTAMP=$(date -u '+%Y-%m-%d %H:%M UTC')
            git commit -m "chore: update translation status report [${TIMESTAMP}]"
            git push
          fi
