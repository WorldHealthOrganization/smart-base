# Top-level CI orchestrator for the smart-base repository.
#
# This workflow responds directly to push and pull-request events so that
# ghbuild.yml remains a pure reusable workflow (workflow_call only) that
# downstream WHO SMART Guidelines IGs can call without picking up smart-base's
# own CI triggers.
#
# Job graph:
#   build-and-deploy  →  calls ghbuild.yml (full IG build + GitHub Pages deploy)
#   commit-pot        →  calls commit-pot.yml (POT extraction + commit/push)
#                        runs after build-and-deploy, skipped on pull-request
#                        events so forks don't need contents: write.
#
# Downstream repositories should call ghbuild.yml directly via workflow_call;
# they do not need this file.

name: CI

on:
  push:
    branches-ignore:
      - 'gh-pages'
  pull_request:
    branches-ignore:
      - 'gh-pages'
  workflow_dispatch:
    inputs:
      tx:
        description: 'Optional Custom terminology server URL'
        required: false
      do_dak:
        description: 'Enable DAK preprocessing and postprocessing'
        required: false
        type: boolean
        default: true

# Concurrency is managed here in the caller, NOT in ghbuild.yml.
# When a reusable workflow defines the same concurrency group as its
# caller, GitHub detects a deadlock and cancels the run.  Only one
# run per branch at a time; newer pushes cancel the older run.
#
# The group name is shared with extract_translations.yml so that
# translation extraction (which also runs the IG Publisher) cannot
# overlap with the full CI build on the same branch.
concurrency:
  group: ci-and-translations-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-and-deploy:
    permissions:
      contents: write        # required so the token passed to ghbuild.yml can push gh-pages
      pull-requests: write   # required so ghbuild.yml can post PR build-status comments
    uses: ./.github/workflows/ghbuild.yml
    with:
      tx: ${{ inputs.tx || '' }}
      do_dak: ${{ inputs.do_dak != false }}
      # Only deploy to gh-pages on push / workflow_dispatch (not on pull_request events).
      # For PRs, gh-pages deployment is gated by the 'pr-preview' GitHub Actions environment
      # (pr-preview.yml) which requires reviewer approval, or by the /deploy slash command
      # (pr-deploy-slash.yml) for ad-hoc manual deploys.
      deploy: ${{ github.event_name != 'pull_request' }}
    secrets: inherit

  commit-pot:
    needs: build-and-deploy
    # Only push .pot commits on push / workflow_dispatch events.
    # Pull-request runs (including forks) do not have contents: write and
    # would fail trying to push back to the branch.
    if: github.event_name != 'pull_request'
    permissions:
      contents: write
    uses: ./.github/workflows/commit-pot.yml
    with:
      push: true
      tx: ${{ inputs.tx || '' }}
      # The IG Publisher already ran in the build-and-deploy job and uploaded
      # its POT files as the "pot-files" artifact.  Reuse them here instead
      # of running the publisher a second time.
      no-publisher: true
    secrets: inherit
