# Top-level CI orchestrator for the smart-base repository.
#
# This workflow responds directly to push and pull-request events so that
# ghbuild.yml remains a pure reusable workflow (workflow_call only) that
# downstream WHO SMART Guidelines IGs can call without picking up smart-base's
# own CI triggers.
#
# Security model
# ──────────────
# Pull requests use `pull_request_target` so that the workflow YAML always
# comes from the base branch (main).  The PR's *content* is checked out via
# the `ref` input to ghbuild.yml, while scripts always come from main (the
# `scripts_ref` default).  This prevents a malicious PR from modifying the
# build scripts or workflow definitions.
#
# Job graph:
#   approve-scripts-override →  (only when scripts_ref ≠ main) environment gate
#   build-and-deploy         →  calls ghbuild.yml (full IG build + GitHub Pages deploy)
#   commit-pot               →  calls commit-pot.yml (POT extraction + commit/push)
#                               runs after build-and-deploy regardless of its result,
#                               skipped on pull-request events so forks don't need
#                               contents: write.
#
# Downstream repositories should call ghbuild.yml directly via workflow_call;
# they do not need this file.

name: CI

on:
  push:
    branches-ignore:
      - 'gh-pages'
  pull_request_target:
    branches-ignore:
      - 'gh-pages'
  workflow_dispatch:
    inputs:
      scripts_ref:
        description: 'Branch/ref of smart-base to fetch scripts from (default: main).  Non-default values require approval.'
        required: false
        type: string
        default: 'main'
      tx:
        description: 'Optional Custom terminology server URL'
        required: false
      do_dak:
        description: 'Enable DAK preprocessing and postprocessing'
        required: false
        type: boolean
        default: true

# Concurrency is managed here in the caller, NOT in ghbuild.yml.
# When a reusable workflow defines the same concurrency group as its
# caller, GitHub detects a deadlock and cancels the run.
#
# Group is scoped per-branch so that:
#   • deploys of different branches (main, feature-x, …) run in parallel;
#   • a new push to the same branch cancels the in-flight deploy for that branch.
#
# The extraction workflows (extract_translations.yml, commit-pot.yml) use their
# own separate concurrency groups so that deploy and extraction are fully
# independent and can run concurrently.
concurrency:
  group: deploy-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ── Approval gate for non-default scripts_ref ─────────────────────────
  # When a trusted contributor manually triggers CI with a custom
  # scripts_ref (e.g. to test script changes on a feature branch),
  # this job pauses until an authorized reviewer approves via the
  # 'scripts-override' environment.
  #
  # For normal runs (push, PR, or workflow_dispatch with default scripts_ref)
  # this job is skipped and build-and-deploy runs immediately.
  #
  # Prerequisites: Create a 'scripts-override' environment in repository
  # Settings → Environments and add required reviewers.
  approve-scripts-override:
    if: >-
      github.event_name == 'workflow_dispatch' &&
      inputs.scripts_ref != '' &&
      inputs.scripts_ref != 'main'
    runs-on: ubuntu-latest
    environment: scripts-override
    steps:
      - run: |
          echo "✅ Scripts override approved for ref: ${SCRIPTS_REF}"
        env:
          SCRIPTS_REF: ${{ inputs.scripts_ref }}

  build-and-deploy:
    needs: [approve-scripts-override]
    # Run when approval succeeded OR was skipped (normal flow).
    if: >-
      always() &&
      (needs.approve-scripts-override.result == 'success' ||
       needs.approve-scripts-override.result == 'skipped')
    permissions:
      contents: write        # required so the token passed to ghbuild.yml can push gh-pages
      pull-requests: write   # required so ghbuild.yml can post PR build-status comments
    uses: ./.github/workflows/ghbuild.yml
    with:
      # For pull_request_target events, check out the PR head commit so the
      # IG publisher builds the PR's content (not the base branch).
      ref: ${{ github.event_name == 'pull_request_target' && github.event.pull_request.head.sha || '' }}
      scripts_ref: ${{ inputs.scripts_ref || 'main' }}
      tx: ${{ inputs.tx || '' }}
      do_dak: ${{ inputs.do_dak != false }}
      # Only deploy to gh-pages on push / workflow_dispatch (not on pull_request_target events).
      # For PRs, gh-pages deployment is gated by the 'pr-preview' GitHub Actions environment
      # (pr-preview.yml) which requires reviewer approval, or by the /deploy slash command
      # (pr-deploy-slash.yml) for ad-hoc manual deploys.
      deploy: ${{ github.event_name != 'pull_request_target' }}
    secrets: inherit

  commit-pot:
    needs: build-and-deploy
    # Run on push / workflow_dispatch events regardless of whether build-and-deploy
    # succeeded or failed — POT extraction uses -generation-off and succeeds
    # independently of the full IG build.
    # Pull-request runs (including forks) are skipped because they do not have
    # contents: write and would fail trying to push back to the branch.
    if: always() && github.event_name != 'pull_request_target'

    permissions:
      contents: write
    uses: ./.github/workflows/commit-pot.yml
    with:
      push: true
      tx: ${{ inputs.tx || '' }}
      # The IG Publisher already ran in the build-and-deploy job and uploaded
      # its POT files as the "pot-files" artifact.  Reuse them here instead
      # of running the publisher a second time.
      no-publisher: true
    secrets: inherit
