# Reusable workflow: extract translation templates (.pot files) and commit them.
#
# Runs the FHIR IG Publisher with -generation-off and -validation-off to produce
# FHIR-resource .pot files without regenerating HTML or re-validating resources,
# then runs extract_translations.py to produce .pot files from diagram sources
# (PlantUML, SVG, ArchiMate) and markdown narrative pages.
# All resulting .pot files are committed (and optionally pushed) to the branch.
#
# When no-publisher is true, the IG Publisher is skipped entirely and
# FHIR-resource .pot files are instead downloaded from a "pot-files" artifact
# produced by a prior build (e.g. ghbuild.yml).  extract_translations.py still
# runs to regenerate diagram/page .pot files from source.
#
# The IG Publisher runs directly on the host runner via actions/setup-java.
# No Docker container is used, so no safe.directory workaround is needed beyond
# the standard git config call below.
#
# All business logic (flag construction, git add/commit/push with retry) lives in
# input/scripts/run_ig_publisher.py.  All GitHub context values are passed via
# environment variables — never interpolated directly into shell commands.
#
# Inputs:
#   ig-root        Repository root directory (default: '.')
#   tx             Optional terminology server URL ('n/a' for offline)
#   push           When true, pull-rebase and push after committing (default: false)
#   no-publisher   When true, skip the IG Publisher and download POT artifacts
#                  from a prior build instead (default: false)
#
# Required caller permissions (when push: true):
#   contents: write

name: Commit POT Files

on:
  workflow_call:
    inputs:
      ig-root:
        description: 'Repository root directory'
        required: false
        type: string
        default: '.'
      tx:
        description: 'Optional terminology server URL (use n/a for offline)'
        required: false
        type: string
      push:
        description: 'Push .pot commits to remote branch after committing'
        required: false
        type: boolean
        default: false
      no-publisher:
        description: 'Skip the IG Publisher; download POT artifacts from a prior build instead'
        required: false
        type: boolean
        default: false

  # Allow standalone manual runs (e.g. ad-hoc template refresh).
  workflow_dispatch:
    inputs:
      ig-root:
        description: 'Repository root directory'
        required: false
        default: '.'
      tx:
        description: 'Optional terminology server URL (use n/a for offline)'
        required: false
      push:
        description: 'Push .pot commits to remote branch after committing'
        required: false
        type: boolean
        default: false

concurrency:
  group: commit-pot-${{ github.ref }}
  cancel-in-progress: false

jobs:
  commit-pot:
    name: Extract translation templates and commit
    runs-on: ubuntu-latest

    permissions:
      contents: write   # required to commit and push .pot files

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: ${{ github.ref }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      # -- IG Publisher prerequisites (skipped when no-publisher is true) --

      - name: Set up Java
        if: inputs.no-publisher != true
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Node.js
        if: inputs.no-publisher != true
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install SUSHI
        if: inputs.no-publisher != true
        run: npm install -g fsh-sushi

      - name: Verify SUSHI installation
        if: inputs.no-publisher != true
        run: sushi --version

      - name: Download latest IG Publisher jar
        if: inputs.no-publisher != true
        run: |
          mkdir -p ./input-cache
          curl -L https://github.com/HL7/fhir-ig-publisher/releases/latest/download/publisher.jar \
            -o ./input-cache/publisher.jar

      # -- When reusing a prior build, download its POT artifacts --

      - name: Download POT artifacts from prior build
        if: inputs.no-publisher == true
        id: download-pot
        uses: actions/download-artifact@v4
        with:
          name: pot-files
          path: .
        continue-on-error: true   # artifact may not exist (e.g. first build)

      - name: Report POT artifact status
        if: inputs.no-publisher == true && steps.download-pot.outcome == 'failure'
        run: |
          echo "::notice::No pot-files artifact found from the prior build." \
               "This is expected on first builds or when the IG Publisher" \
               "did not produce any .pot files."

      # -- Common steps (always run) --

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "PyYAML>=6.0" "requests>=2.28.0" lxml

      - name: Configure git for commits
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          # Suppress dubious-ownership warnings that can appear when the
          # runner uid differs from the file owner (e.g. after a Docker step).
          git config --global --add safe.directory "$GITHUB_WORKSPACE"

      # TX_SERVER, BRANCH_NAME, and GITHUB_ACTOR are passed via env: so that
      # GitHub context values are never interpolated directly into shell commands.
      # run_ig_publisher.py reads, validates, and uses them internally.
      #
      # When no-publisher is true, --no-publisher tells the script to skip the
      # IG Publisher invocation while still running extract_translations.py and
      # committing/pushing the resulting .pot files.
      - name: Extract translations, commit and push
        env:
          TX_SERVER: ${{ inputs.tx }}
          BRANCH_NAME: ${{ github.ref_name }}
          GITHUB_ACTOR: ${{ github.actor }}
          IG_ROOT: ${{ inputs['ig-root'] || '.' }}
          PUSH_ENABLED: ${{ inputs.push }}
          NO_PUBLISHER: ${{ inputs.no-publisher }}
        run: |
          PUSH_FLAG=""
          if [ "$PUSH_ENABLED" = "true" ]; then
            PUSH_FLAG="--push"
          fi
          NO_PUB_FLAG=""
          if [ "$NO_PUBLISHER" = "true" ]; then
            NO_PUB_FLAG="--no-publisher"
          fi
          python3 input/scripts/run_ig_publisher.py \
            --ig-root "$IG_ROOT" \
            $PUSH_FLAG \
            $NO_PUB_FLAG

      # ── Extract translatable strings from Python scripts ────────────────
      # Produces input/scripts/translations/scripts.pot alongside other .pot
      # files so that script-sourced strings are translatable too.
      - name: Extract Python script strings (.pot)
        env:
          IG_ROOT: ${{ inputs['ig-root'] || '.' }}
        run: |
          python3 input/scripts/extract_script_strings.py \
            --scripts-dir "${IG_ROOT}/input/scripts" \
            --output "${IG_ROOT}/input/scripts/translations/scripts.pot"

      - name: Commit script .pot file
        if: inputs.push == true || inputs.push == 'true'
        env:
          BRANCH_NAME: ${{ github.ref_name }}
        run: |
          git add -- 'input/scripts/translations/scripts.pot' 2>/dev/null || true
          if ! git diff --cached --quiet; then
            git commit -m "chore: update scripts.pot translation template"
            git pull --rebase origin "${BRANCH_NAME}" || true
            git push origin "HEAD:${BRANCH_NAME}"
          fi
