# Register the current DAK IG with all enabled translation services
# (Weblate, Launchpad, Crowdin).
#
# Registration logic lives in:
#   input/scripts/register_translation_project.py
#
# Required repository secrets:
#   WEBLATE_API_TOKEN    — Weblate API token with project-admin access
#   CROWDIN_API_TOKEN    — Crowdin API token (if Crowdin enabled)
#   LAUNCHPAD_API_TOKEN  — Launchpad API token (if Launchpad enabled)
#
# ⚠️ API tokens are NEVER workflow inputs. They are always secrets.

name: Register Translation Project

on:
  workflow_dispatch:
    inputs:
      service:
        description: 'Translation service to register with'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - weblate
          - launchpad
          - crowdin

  repository_dispatch:
    types: [dak-ig-registered]

concurrency:
  group: register-translation
  cancel-in-progress: false

jobs:
  register:
    name: Register translation project
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: input/scripts/requirements.txt

      - name: Install Python dependencies
        run: pip install -r input/scripts/requirements.txt

      - name: Register translation project
        env:
          WEBLATE_API_TOKEN: ${{ secrets.WEBLATE_API_TOKEN }}
          CROWDIN_API_TOKEN: ${{ secrets.CROWDIN_API_TOKEN }}
          LAUNCHPAD_API_TOKEN: ${{ secrets.LAUNCHPAD_API_TOKEN }}
          INPUT_SERVICE: ${{ inputs.service || 'all' }}
        run: |
          python input/scripts/register_translation_project.py --service "$INPUT_SERVICE"
