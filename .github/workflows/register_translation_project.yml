# Register a WHO SMART IG with Weblate translation platform.
#
# Creates the Weblate project and one component per discovered .pot file if
# they do not already exist.  Safe to run repeatedly (idempotent) — existing
# resources are left unchanged.
#
# Required secret:
#   WEBLATE_ADMIN_TOKEN  — Weblate API token with project-admin privileges.
#     Create: https://hosted.weblate.org/accounts/profile/#api
#     Docs:   https://docs.weblate.org/en/latest/api.html#authentication
#
# This workflow is called manually (workflow_dispatch) when setting up a new
# downstream IG or after adding new translation components to an existing one.

name: Register Translation Project

on:
  workflow_call:
    inputs:
      weblate_url:
        description: 'Weblate base URL'
        required: false
        type: string
        default: 'https://hosted.weblate.org'
      branch:
        description: 'Branch to register in Weblate (default: current branch)'
        required: false
        type: string
        default: ''
      dry_run:
        description: 'Print planned actions without making API calls'
        required: false
        type: boolean
        default: false

  workflow_dispatch:
    inputs:
      weblate_url:
        description: 'Weblate base URL'
        required: false
        default: 'https://hosted.weblate.org'
      branch:
        description: 'Branch to register in Weblate (default: current branch)'
        required: false
        default: ''
      dry_run:
        description: 'Print planned actions without making API calls'
        required: false
        type: boolean
        default: false

concurrency:
  group: register-translation-${{ github.ref }}
  cancel-in-progress: false

jobs:
  register:
    name: Register translation project in Weblate
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Gate on DAK being enabled ─────────────────────────────────────
      - name: Check for DAK configuration
        id: dak_check
        run: |
          if [ -f "dak.json" ]; then
            echo "DAK_ENABLED=true" >> "$GITHUB_OUTPUT"
            echo "✅ dak.json found — registration is enabled"
          else
            echo "DAK_ENABLED=false" >> "$GITHUB_OUTPUT"
            echo "⚠️ dak.json not found — skipping registration (DAK not enabled)"
          fi

      - name: Set up Python
        if: steps.dak_check.outputs.DAK_ENABLED == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: input/scripts/requirements.txt

      - name: Install Python dependencies
        if: steps.dak_check.outputs.DAK_ENABLED == 'true'
        run: pip install -r input/scripts/requirements.txt

      - name: Register project in Weblate
        if: steps.dak_check.outputs.DAK_ENABLED == 'true'
        env:
          WEBLATE_ADMIN_TOKEN: ${{ secrets.WEBLATE_ADMIN_TOKEN }}
          GITHUB_REPOSITORY:   ${{ github.repository }}
          GITHUB_REF_NAME:     ${{ github.ref_name }}
        run: |
          ARGS=(
            --repo-root  "."
            --weblate-url "${{ inputs.weblate_url || 'https://hosted.weblate.org' }}"
            --repo-url   "https://github.com/${{ github.repository }}"
          )
          BRANCH="${{ inputs.branch || github.ref_name }}"
          ARGS+=(--branch "${BRANCH}")
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            ARGS+=(--dry-run)
          fi
          python input/scripts/register_translation_project.py "${ARGS[@]}"
