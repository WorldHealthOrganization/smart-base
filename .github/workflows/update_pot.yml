# Update POT/PO translation files when source Markdown documentation changes.
#
# This workflow is triggered whenever files in input/pagecontent/ are pushed
# to the default branch.  It runs md_to_pot.py to regenerate the POT
# template and refresh the per-language PO stubs, then commits the changes
# back to the branch so that Weblate always has an up-to-date template.
#
# Weblate should be configured to pull from this repository.  The Weblate
# component definition lives in .weblate.yml at the repository root.

name: Update POT translation files

on:
  push:
    branches:
      - main
    paths:
      - 'input/pagecontent/**.md'
      - 'input/scripts/md_to_pot.py'
  workflow_dispatch:

jobs:
  update-pot:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          # Use a PAT (or the default GITHUB_TOKEN) so the commit is accepted
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "polib>=1.2.0"

      - name: Regenerate POT template and PO stubs
        run: |
          python3 input/scripts/md_to_pot.py
          echo "Translation files updated."

      - name: Commit updated translation files
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add input/translations/
          if git diff --cached --quiet; then
            echo "No translation changes to commit."
          else
            git commit -m "chore(i18n): update POT/PO translation files [skip ci]"
            git push
          fi
