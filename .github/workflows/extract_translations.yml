# Extract translation template (.pot) files from FHIR resources and diagram sources
#
# Runs the FHIR IG Publisher to generate .pot files from FHIR resources and
# markdown narrative, then runs extract_translations.py to generate .pot files
# from diagram sources (PlantUML, SVG, ArchiMate).  The resulting .pot files
# are committed back to the branch for Weblate to pick up.
#
# The IG output is NOT deployed to GitHub Pages — this workflow is translation-
# extraction only and does not modify ghbuild.yml.
#
# Translation extraction logic lives in:
#   input/scripts/extract_translations.py
#
# Weblate component → .pot file mapping (aligned with weblate.yaml):
#   fhir-resources      → input/fsh/translations/base.pot        (IG Publisher)
#   plantuml-diagrams   → input/images-source/translations/diagrams.pot
#   svg-images          → input/images/translations/images.pot
#   archimate-models    → input/archimate/translations/models.pot
#   uml-diagrams        → input/diagrams/translations/diagrams.pot

name: Extract Translation Templates

on:
  # ── Manual trigger from the GitHub Actions UI ──────────────────────────
  workflow_dispatch:
    inputs:
      tx:
        description: 'Optional terminology server URL (use n/a for offline)'
        required: false

  # ── Optional: run automatically when diagram sources change ────────────
  # Uncomment to enable automatic extraction on push:
  # push:
  #   branches:
  #     - main
  #   paths:
  #     - 'input/images-source/**'
  #     - 'input/images/**'
  #     - 'input/archimate/**'
  #     - 'input/diagrams/**'

concurrency:
  group: extract-translations
  cancel-in-progress: false

jobs:
  # Run the IG Publisher (to generate .pot from FHIR resources/markdown),
  # then extract .pot files from diagram sources and commit them back to the
  # branch.  No GitHub Pages deployment is performed.
  build-and-extract:
    name: Build IG and extract translation templates
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: ${{ github.ref }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "PyYAML>=6.0" "requests>=2.28.0" lxml

      - name: Download latest IG Publisher jar
        uses: docker://hl7fhir/ig-publisher-base:latest
        with:
          args: curl -L https://github.com/HL7/fhir-ig-publisher/releases/latest/download/publisher.jar -o ./input-cache/publisher.jar --create-dirs

      - name: Create package cache folder
        uses: docker://hl7fhir/ig-publisher-base:latest
        with:
          entrypoint: /bin/sh
          args: -c "mkdir -p ./fhir-package-cache && chown 1001:127 ./fhir-package-cache"

      - name: Prepare FHIR home directory
        uses: docker://hl7fhir/ig-publisher-base:latest
        with:
          entrypoint: /bin/sh
          args: -c "mkdir -p /var/lib/.fhir && chown $(id -u):$(id -g) /var/lib/.fhir"

      - name: Run IG Publisher (no deployment)
        run: |
          CMD="java -Xmx6g -jar ./input-cache/publisher.jar publisher \
            -ig . \
            -package-cache-folder ./fhir-package-cache"

          if [ -n "${{ inputs.tx }}" ]; then
            CMD="$CMD -tx ${{ inputs.tx }}"
          fi

          echo "Running command: $CMD"

          docker run -d --name ig-run \
            -v ${{ github.workspace }}:/work \
            -w /work \
            hl7fhir/ig-publisher-base:latest \
            sleep infinity

          sleep 5

          docker exec -w /work ig-run sh -c "$CMD"

          docker rm -f ig-run

      - name: Extract translation templates (.pot) from diagram sources
        run: |
          echo "Extracting translation templates (.pot) from diagram sources..."

          # Check if extraction script exists locally, download if needed
          if [ ! -f "input/scripts/extract_translations.py" ]; then
            echo "Translation extraction script not found locally, downloading from smart-base repository..."
            mkdir -p input/scripts
            curl -L -f -o "input/scripts/extract_translations.py" \
              "https://raw.githubusercontent.com/WorldHealthOrganization/smart-base/main/input/scripts/extract_translations.py" \
              2>/dev/null || echo "Failed to download extract_translations.py"
          fi

          if [ -f "input/scripts/extract_translations.py" ]; then
            CANONICAL=$(python3 -c "import yaml; cfg=yaml.safe_load(open('sushi-config.yaml')); print(cfg.get('canonical',''))" 2>/dev/null || echo "")
            python3 input/scripts/extract_translations.py \
              --ig-root "." \
              --canonical "${CANONICAL}"
            echo "✅ Diagram translation templates extracted"
          else
            echo "⚠️ Translation extraction script not available, skipping"
          fi

      - name: Commit and push updated .pot files
        env:
          ACTOR: ${{ github.actor }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          git add -- \
            'input/fsh/translations/' \
            'input/images-source/translations/' \
            'input/images/translations/' \
            'input/archimate/translations/' \
            'input/diagrams/translations/' \
            2>/dev/null || true

          if git diff --cached --quiet; then
            echo "No translation template changes to commit."
            exit 0
          fi

          TIMESTAMP=$(date -u '+%Y-%m-%d %H:%M UTC')
          MSG="chore: update translation templates (.pot) [${TIMESTAMP}]"$'\n\n'
          MSG+="Regenerated via IG Publisher and extract_translations.py."$'\n'
          MSG+="Triggered by: ${ACTOR}"
          git commit -m "$MSG"

          # Pull and rebase to handle any commits that landed since checkout,
          # then push.  Retry up to 3 times.
          for i in 1 2 3; do
            git pull --rebase origin "${{ github.ref_name }}" && git push \
              && { echo "✅ Translation templates committed and pushed"; exit 0; }
            echo "Push attempt ${i} failed, retrying in $((i * 10)) seconds..."
            sleep "$((i * 10))"
          done
          echo "⚠️ Failed to push translation templates after 3 attempts"
          exit 1
