# Extract translation template (.pot) files from diagram sources
#
# Runs extract_translations.py to scan diagram source files
# (PlantUML, SVG, ArchiMate, UML) and regenerate the Gettext .pot template
# files used by Weblate for localisation.
#
# The generated .pot files are committed back to the branch so that Weblate
# can detect new/changed translatable strings.
#
# Extraction logic lives in:
#   input/scripts/extract_translations.py
#
# Weblate component → .pot file mapping (aligned with weblate.yaml):
#   fhir-resources      → input/fsh/translations/base.pot
#   plantuml-diagrams   → input/images-source/translations/diagrams.pot
#   svg-images          → input/images/translations/images.pot
#   archimate-models    → input/archimate/translations/models.pot
#   uml-diagrams        → input/diagrams/translations/diagrams.pot

name: Extract Translation Templates

on:
  # ── Manual trigger from the GitHub Actions UI ──────────────────────────
  workflow_dispatch:

  # ── Optional: run automatically when diagram sources change ────────────
  # Uncomment to enable automatic extraction on push:
  # push:
  #   branches:
  #     - main
  #   paths:
  #     - 'input/images-source/**'
  #     - 'input/images/**'
  #     - 'input/archimate/**'
  #     - 'input/diagrams/**'

concurrency:
  group: extract-translations
  cancel-in-progress: false

jobs:
  extract-translations:
    name: Extract .pot files from diagram sources
    runs-on: ubuntu-latest

    permissions:
      contents: write   # required to commit .pot files back to the branch

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── Gate all translation work on DAK being enabled ──────────────────
      - name: Check for DAK configuration
        id: dak_check
        run: |
          if [ -f "dak.json" ]; then
            echo "DAK_ENABLED=true" >> "$GITHUB_OUTPUT"
            echo "✅ dak.json found — translation extraction is enabled"
          else
            echo "DAK_ENABLED=false" >> "$GITHUB_OUTPUT"
            echo "⚠️ dak.json not found — skipping extraction (DAK not enabled)"
          fi

      - name: Set up Python
        if: steps.dak_check.outputs.DAK_ENABLED == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: input/scripts/requirements.txt

      - name: Install Python dependencies
        if: steps.dak_check.outputs.DAK_ENABLED == 'true'
        run: pip install -r input/scripts/requirements.txt

      # ── Derive canonical URL from sushi-config.yaml ────────────────────
      - name: Extract canonical URL from sushi-config.yaml
        if: steps.dak_check.outputs.DAK_ENABLED == 'true'
        id: canonical
        run: |
          # Strip all characters not valid in a URL to prevent output injection
          CANONICAL=$(grep -m1 '^canonical:' sushi-config.yaml | awk '{print $2}' | tr -d "'\"" | tr -cd 'A-Za-z0-9/:._-')
          echo "url=${CANONICAL}" >> "$GITHUB_OUTPUT"

      - name: Extract .pot translation template files
        if: steps.dak_check.outputs.DAK_ENABLED == 'true'
        env:
          CANONICAL_URL: ${{ steps.canonical.outputs.url }}
        run: |
          python input/scripts/extract_translations.py \
            --canonical  "${CANONICAL_URL}"

      # ── Commit any updated .pot files back to the branch ────────────────
      - name: Commit updated translation templates
        if: steps.dak_check.outputs.DAK_ENABLED == 'true'
        env:
          ACTOR: ${{ github.actor }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Stage only .pot translation template files
          git add -- \
            'input/fsh/translations/' \
            'input/images-source/translations/' \
            'input/images/translations/' \
            'input/archimate/translations/' \
            'input/diagrams/translations/' \
            2>/dev/null || true

          if git diff --cached --quiet; then
            echo "No translation template changes to commit."
          else
            # Sanitize actor name to safe characters only
            SAFE_ACTOR=$(echo "${ACTOR}" | tr -cd 'A-Za-z0-9._@-')
            TIMESTAMP=$(date -u '+%Y-%m-%d %H:%M UTC')
            MSG="chore: update translation templates (.pot) [${TIMESTAMP}]"$'\n\n'
            MSG+="Regenerated via extract_translations.py by GitHub Actions."$'\n'
            MSG+="Triggered by: ${SAFE_ACTOR}"
            git commit -m "$MSG"
            git push
          fi
