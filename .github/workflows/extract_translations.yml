# Extract translation template (.pot) files from FHIR resources and diagram sources
#
# Runs the FHIR IG Publisher with -generation-off to generate .pot files from
# FHIR resources only (HTML page generation is suppressed), then runs
# extract_translations.py to generate .pot files from diagram sources
# (PlantUML, SVG, ArchiMate) and markdown narrative pages (input/pagecontent/).
# The resulting .pot files are committed back to the branch for Weblate to pick up.
#
# Markdown page POT files are extracted by extract_translations.py using Python
# (not the IG Publisher) so that the -generation-off flag can be used to speed
# up the IG Publisher run.  The IG Publisher is retained only for FHIR resource
# translation templates.
#
# Note on Prism.js: syntax highlighting in generated pages is provided by
# Prism.js bundled in the base FHIR IG Publisher template (who.template.root).
# No separate Prism.js loading is required.
#
# The IG output is NOT deployed to GitHub Pages — this workflow is translation-
# extraction only and does not modify ghbuild.yml.
#
# All business logic (command construction, git add/commit/push with retry)
# lives in input/scripts/run_ig_publisher.py.  All GitHub context values are
# passed via environment variables — never interpolated directly into shell
# commands — so that untrusted input cannot inject shell commands.
#
# Weblate component → .pot file mapping (aligned with weblate.yaml):
#   fhir-resources      → input/fsh/translations/base.pot        (IG Publisher)
#   plantuml-diagrams   → input/images-source/translations/diagrams.pot
#   svg-images          → input/images/translations/images.pot
#   archimate-models    → input/archimate/translations/models.pot
#   uml-diagrams        → input/diagrams/translations/diagrams.pot
#   markdown-pages      → input/pagecontent/translations/pages.pot (Python extractor)

name: Extract Translation Templates

on:
  # ── Manual trigger from the GitHub Actions UI ──────────────────────────
  workflow_dispatch:
    inputs:
      tx:
        description: 'Optional terminology server URL (use n/a for offline)'
        required: false

  # ── Optional: run automatically when diagram sources change ────────────
  # Uncomment to enable automatic extraction on push:
  # push:
  #   branches:
  #     - main
  #   paths:
  #     - 'input/images-source/**'
  #     - 'input/images/**'
  #     - 'input/archimate/**'
  #     - 'input/diagrams/**'

concurrency:
  group: extract-translations
  cancel-in-progress: false

jobs:
  # Run the IG Publisher with -generation-off (FHIR resource POT extraction only),
  # then extract .pot files from diagram sources and markdown narrative pages,
  # and commit them back to the branch.  No GitHub Pages deployment is performed.
  build-and-extract:
    name: Build IG and extract translation templates
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: ${{ github.ref }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "PyYAML>=6.0" "requests>=2.28.0" lxml

      - name: Download latest IG Publisher jar
        uses: docker://hl7fhir/ig-publisher-base:latest
        with:
          args: curl -L https://github.com/HL7/fhir-ig-publisher/releases/latest/download/publisher.jar -o ./input-cache/publisher.jar --create-dirs

      - name: Create package cache folder
        uses: docker://hl7fhir/ig-publisher-base:latest
        with:
          entrypoint: /bin/sh
          args: -c "mkdir -p ./fhir-package-cache && chown 1001:127 ./fhir-package-cache"

      - name: Prepare FHIR home directory
        uses: docker://hl7fhir/ig-publisher-base:latest
        with:
          entrypoint: /bin/sh
          args: -c "mkdir -p /var/lib/.fhir && chown $(id -u):$(id -g) /var/lib/.fhir"

      # TX_SERVER and GH_WORKSPACE are passed via env: so that the untrusted
      # inputs.tx value is never interpolated directly into a shell command.
      - name: Run IG Publisher (no deployment)
        env:
          TX_SERVER: ${{ inputs.tx }}
          GH_WORKSPACE: ${{ github.workspace }}
        run: |
          docker run -d --name ig-run \
            -v "${GH_WORKSPACE}:/work" \
            -w /work \
            hl7fhir/ig-publisher-base:latest \
            sleep infinity

          sleep 5

          # Install Python inside the container so run_ig_publisher.py can run there.
          # The who.template.root ant script calls "python" (not "python3"), so we
          # create a symlink to ensure compatibility.
          docker exec --user root ig-run sh -c \
            'apt-get update -qq \
             && apt-get install -y --no-install-recommends python3 python3-pip \
             && ln -sf /usr/bin/python3 /usr/bin/python \
             && pip3 install --quiet --break-system-packages "PyYAML>=6.0" lxml requests'

          # Mark /work as a safe directory to suppress git dubious ownership warnings
          # emitted by the IG Publisher when it tries to read the current branch.
          docker exec ig-run git config --global --add safe.directory /work

          # TX_SERVER is forwarded to the container via -e; run_ig_publisher.py
          # reads and sanitizes it from the environment — no shell interpolation.
          docker exec -w /work -e TX_SERVER ig-run \
            python3 input/scripts/run_ig_publisher.py --ig-root . --skip-commit

          docker rm -f ig-run

      - name: Configure git for commits
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"


      # BRANCH_NAME and GITHUB_ACTOR are passed via env: so that these GitHub
      # context values are never interpolated directly into shell commands.
      # run_ig_publisher.py reads, validates, and uses them internally.
      - name: Commit and push translation templates
        env:
          BRANCH_NAME: ${{ github.ref_name }}
          GITHUB_ACTOR: ${{ github.actor }}
        run: |
          python3 input/scripts/run_ig_publisher.py \
            --ig-root . \
            --no-publisher \
            --push

