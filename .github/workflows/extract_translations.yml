# Extract translation template (.pot) files from FHIR resources and diagram sources.
#
# Delegates all work to the reusable commit-pot.yml workflow, which:
#   • runs the FHIR IG Publisher with -generation-off and -validation-off so that
#     FHIR-resource .pot files are produced without regenerating HTML or
#     re-running full validation;
#   • runs extract_translations.py to produce .pot files from diagram sources
#     (PlantUML, SVG, ArchiMate) and markdown narrative pages;
#   • commits all .pot files together and pushes them to the branch.
#
# The IG output is NOT deployed to GitHub Pages — this workflow is for
# translation-template extraction only.
#
# Weblate component → .pot file mapping (aligned with weblate.yaml):
#   fhir-resources      → input/fsh/translations/base.pot        (IG Publisher)
#   plantuml-diagrams   → input/images-source/translations/diagrams.pot
#   svg-images          → input/images/translations/images.pot
#   archimate-models    → input/archimate/translations/models.pot
#   uml-diagrams        → input/diagrams/translations/diagrams.pot
#   markdown-pages      → input/pagecontent/translations/pages.pot (Python extractor)

name: Extract Translation Templates

on:
  # ── Manual trigger from the GitHub Actions UI ──────────────────────────
  workflow_dispatch:
    inputs:
      tx:
        description: 'Optional terminology server URL (use n/a for offline)'
        required: false

  # ── Optional: run automatically when diagram sources change ────────────
  # Uncomment to enable automatic extraction on push:
  # push:
  #   branches:
  #     - main
  #   paths:
  #     - 'input/images-source/**'
  #     - 'input/images/**'
  #     - 'input/archimate/**'
  #     - 'input/diagrams/**'

# Shared with ci.yml so that translation extraction (which runs the IG
# Publisher) cannot overlap with the full CI build on the same branch.
# cancel-in-progress is false so that a manually triggered extraction
# waits for CI to finish rather than cancelling it.
concurrency:
  group: ci-and-translations-${{ github.ref }}
  cancel-in-progress: false

jobs:
  commit-pot:
    permissions:
      contents: write
    uses: ./.github/workflows/commit-pot.yml
    with:
      tx: ${{ inputs.tx || '' }}
      push: true
    secrets: inherit

