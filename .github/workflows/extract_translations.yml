# Extract translation template (.pot) files from FHIR resources and diagram sources
#
# Runs the FHIR IG Publisher with -generation-off to generate .pot files from
# FHIR resources only (HTML page generation is suppressed), then runs
# extract_translations.py to generate .pot files from diagram sources
# (PlantUML, SVG, ArchiMate) and markdown narrative pages (input/pagecontent/).
# The resulting .pot files are committed back to the branch for Weblate to pick up.
#
# All .pot files — both those produced by the IG Publisher (FHIR resources/profiles)
# and those extracted by extract_translations.py (markdown, SVG, PlantUML, ArchiMate)
# — are committed together in a single git commit by a single invocation of
# input/scripts/run_ig_publisher.py.  This keeps translation templates coordinated
# and always in sync for translators.
#
# The IG Publisher and Python extractors run directly on the host runner (not inside
# a Docker container).  Java is provided by actions/setup-java.
#
# Note on Prism.js: syntax highlighting in generated pages is provided by
# Prism.js bundled in the base FHIR IG Publisher template (who.template.root).
# No separate Prism.js loading is required.
#
# The IG output is NOT deployed to GitHub Pages — this workflow is translation-
# extraction only and does not modify ghbuild.yml.
#
# All business logic (command construction, git add/commit/push with retry)
# lives in input/scripts/run_ig_publisher.py.  All GitHub context values are
# passed via environment variables — never interpolated directly into shell
# commands — so that untrusted input cannot inject shell commands.
#
# Weblate component → .pot file mapping (aligned with weblate.yaml):
#   fhir-resources      → input/fsh/translations/base.pot        (IG Publisher)
#   plantuml-diagrams   → input/images-source/translations/diagrams.pot
#   svg-images          → input/images/translations/images.pot
#   archimate-models    → input/archimate/translations/models.pot
#   uml-diagrams        → input/diagrams/translations/diagrams.pot
#   markdown-pages      → input/pagecontent/translations/pages.pot (Python extractor)

name: Extract Translation Templates

on:
  # ── Manual trigger from the GitHub Actions UI ──────────────────────────
  workflow_dispatch:
    inputs:
      tx:
        description: 'Optional terminology server URL (use n/a for offline)'
        required: false

  # ── Optional: run automatically when diagram sources change ────────────
  # Uncomment to enable automatic extraction on push:
  # push:
  #   branches:
  #     - main
  #   paths:
  #     - 'input/images-source/**'
  #     - 'input/images/**'
  #     - 'input/archimate/**'
  #     - 'input/diagrams/**'

concurrency:
  group: extract-translations
  cancel-in-progress: false

jobs:
  # Run the IG Publisher with -generation-off and extract .pot files from diagram
  # sources and markdown narrative pages in a single invocation of
  # run_ig_publisher.py, then commit all .pot files together and push.
  # No GitHub Pages deployment is performed.
  build-and-extract:
    name: Build IG and extract translation templates
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          ref: ${{ github.ref }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install "PyYAML>=6.0" "requests>=2.28.0" lxml

      - name: Download latest IG Publisher jar
        run: |
          mkdir -p ./input-cache
          curl -L https://github.com/HL7/fhir-ig-publisher/releases/latest/download/publisher.jar \
            -o ./input-cache/publisher.jar

      - name: Configure git for commits
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      # TX_SERVER, BRANCH_NAME, and GITHUB_ACTOR are passed via env: so that these
      # GitHub context values are never interpolated directly into shell commands.
      # run_ig_publisher.py reads, validates, and uses them internally.
      # A single invocation runs the IG Publisher, Python extractors, and commits
      # all .pot files together so that FHIR resource templates and diagram/markdown
      # templates are always in sync.
      - name: Run IG Publisher, extract translations, commit and push
        env:
          TX_SERVER: ${{ inputs.tx }}
          BRANCH_NAME: ${{ github.ref_name }}
          GITHUB_ACTOR: ${{ github.actor }}
        run: |
          python3 input/scripts/run_ig_publisher.py \
            --ig-root . \
            --push

