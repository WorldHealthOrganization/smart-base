name: PR Slash-Command Validate

# Lets any collaborator post /validate in a PR comment to manually trigger
# DAK structural validation for that PR's branch.
#
# Security: This workflow uses the dispatch pattern (like pr-deploy-slash.yml)
# to avoid running untrusted PR code in a privileged issue_comment context.

on:
  issue_comment:
    types: [created]

jobs:
  dispatch:
    # Only run on pull-request comments that start with /validate
    if: >
      github.event.issue.pull_request != null &&
      startsWith(github.event.comment.body, '/validate')
    runs-on: ubuntu-latest
    permissions:
      issues: write
      actions: write
      pull-requests: read

    steps:
      - name: Acknowledge the slash command with a reaction
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.reactions.createForIssueComment({
              owner: context.repo.owner, repo: context.repo.repo,
              comment_id: context.payload.comment.id, content: 'eyes',
            });

      - name: Get the PR branch name
        id: pr
        uses: actions/github-script@v7
        with:
          script: |
            const pr = await github.rest.pulls.get({
              owner: context.repo.owner, repo: context.repo.repo,
              pull_number: context.issue.number,
            });
            core.setOutput('branch', pr.data.head.ref);

      - name: Trigger ghbuild.yml for the PR branch
        uses: actions/github-script@v7
        # Pass the branch name via env to avoid script injection from untrusted data
        env:
          BRANCH_REF: ${{ steps.pr.outputs.branch }}
        with:
          script: |
            const branchRef = process.env.BRANCH_REF;
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner, repo: context.repo.repo,
              workflow_id: 'ghbuild.yml',
              ref: branchRef,
              inputs: { do_dak: 'true' },
            });

      - name: Post a confirmation comment
        uses: actions/github-script@v7
        env:
          BRANCH_REF: ${{ steps.pr.outputs.branch }}
        with:
          script: |
            const branch = process.env.BRANCH_REF;
            const runsUrl = `https://github.com/${context.repo.owner}/${context.repo.repo}/actions/workflows/ghbuild.yml`;
            await github.rest.issues.createComment({
              owner: context.repo.owner, repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `👁️ **Validation triggered** for branch \`${branch}\`.\n\nThe DAK validation build is queued — [watch progress](${runsUrl}).`,
            });

