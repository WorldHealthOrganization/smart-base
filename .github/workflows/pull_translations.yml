# Pull translations from all enabled translation services (Weblate, Launchpad,
# Crowdin) as configured in dak.json.
#
# Uses the multi-service orchestrator pull_translations.py which delegates to
# per-service adapter scripts. Creates feature branches (translations/{service})
# and opens PRs automatically when new translations arrive.
#
# All download / orchestration logic lives in:
#   input/scripts/pull_translations.py          — multi-service orchestrator
#   input/scripts/pull_weblate_translations.py  — Weblate adapter
#   input/scripts/pull_launchpad_translations.py — Launchpad adapter
#   input/scripts/pull_crowdin_translations.py   — Crowdin adapter
#
# Required repository secrets:
#   WEBLATE_API_TOKEN    — Weblate API token with at least read access
#   CROWDIN_API_TOKEN    — Crowdin API token (if Crowdin enabled)
#   LAUNCHPAD_API_TOKEN  — Launchpad API token (if Launchpad enabled)
#
# ⚠️ No token inputs. All tokens are secrets only.
#
# Weblate API docs: https://docs.weblate.org/en/latest/api.html

name: Pull Translations

on:
  # ── Manual trigger from the GitHub Actions UI ──────────────────────────
  workflow_dispatch:
    inputs:
      service:
        description: 'Translation service to pull from'
        required: false
        default: 'all'
        type: choice
        options:
          - all
          - weblate
          - launchpad
          - crowdin
      component:
        description: 'Component to pull (blank = all)'
        required: false
        default: ''
      language:
        description: 'Language code to pull (blank = all)'
        required: false
        default: ''
      weblate_url:
        description: 'Weblate base URL (override)'
        required: false
        default: 'https://hosted.weblate.org'

  # ── Nightly scheduled pull ─────────────────────────────────────────────
  schedule:
    - cron: '0 2 * * *'   # 02:00 UTC every day

concurrency:
  group: pull-translations
  cancel-in-progress: false

jobs:
  pull-translations:
    name: Pull .po files from translation services
    runs-on: ubuntu-latest

    permissions:
      contents: write
      pull-requests: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── Gate all translation work on DAK being enabled ──────────────────
      - name: Check for DAK configuration
        id: dak_check
        run: |
          if [ -f "dak.json" ]; then
            echo "DAK_ENABLED=true" >> "$GITHUB_OUTPUT"
            echo "✅ dak.json found — translation pull is enabled"
          else
            echo "DAK_ENABLED=false" >> "$GITHUB_OUTPUT"
            echo "⚠️ dak.json not found — skipping translation pull (DAK not enabled)"
          fi

      - name: Set up Python
        if: steps.dak_check.outputs.DAK_ENABLED == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: input/scripts/requirements.txt

      - name: Install Python dependencies
        if: steps.dak_check.outputs.DAK_ENABLED == 'true'
        run: pip install -r input/scripts/requirements.txt

      # ── All download logic is in the Python script ──────────────────────
      # User inputs are passed via environment variables, NEVER interpolated
      # directly into shell commands, to prevent script-injection attacks.
      - name: Download .po files from translation services
        if: steps.dak_check.outputs.DAK_ENABLED == 'true'
        env:
          WEBLATE_API_TOKEN:   ${{ secrets.WEBLATE_API_TOKEN }}
          CROWDIN_API_TOKEN:   ${{ secrets.CROWDIN_API_TOKEN }}
          LAUNCHPAD_API_TOKEN: ${{ secrets.LAUNCHPAD_API_TOKEN }}
          INPUT_SERVICE:       ${{ inputs.service || 'all' }}
          INPUT_COMPONENT:     ${{ inputs.component || '' }}
          INPUT_LANGUAGE:      ${{ inputs.language || '' }}
        run: |
          python input/scripts/pull_translations.py \
            --service "${INPUT_SERVICE}" \
            --component "${INPUT_COMPONENT}" \
            --language "${INPUT_LANGUAGE}" \
            --repo-root "."

      # ── Commit any updated .po files to a feature branch ────────────────
      - name: Commit updated translations
        if: steps.dak_check.outputs.DAK_ENABLED == 'true'
        env:
          ACTOR: ${{ github.actor }}
          INPUT_SERVICE: ${{ inputs.service || 'all' }}
          INPUT_COMPONENT: ${{ inputs.component || '' }}
          INPUT_LANGUAGE: ${{ inputs.language || '' }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Stage all translation .po files
          git add -- '**/translations/*.po' 2>/dev/null || true

          if git diff --cached --quiet; then
            echo "No translation changes to commit."
            exit 0
          fi

          # Determine feature branch name based on service
          SERVICE="${INPUT_SERVICE:-all}"
          BRANCH="translations/${SERVICE}"

          # Create or switch to the feature branch
          git fetch origin "${BRANCH}" 2>/dev/null || true
          if git rev-parse --verify "origin/${BRANCH}" >/dev/null 2>&1; then
            git checkout -B "${BRANCH}" "origin/${BRANCH}"
            # Re-stage after branch switch
            git add -- '**/translations/*.po' 2>/dev/null || true
          else
            git checkout -b "${BRANCH}"
          fi

          TIMESTAMP=$(date -u '+%Y-%m-%d %H:%M UTC')
          MSG="chore: update translations from ${SERVICE} [${TIMESTAMP}]"$'\n\n'
          MSG+="Pulled via translation API by GitHub Actions."$'\n'
          MSG+="Triggered by: ${ACTOR}"$'\n'
          MSG+="Service: ${INPUT_SERVICE:-all}"$'\n'
          MSG+="Component filter: ${INPUT_COMPONENT:-all}"$'\n'
          MSG+="Language filter:  ${INPUT_LANGUAGE:-all}"
          git commit -m "$MSG"
          git push origin "${BRANCH}"

          # Create PR if none exists for this branch
          EXISTING_PR=$(gh pr list --head "${BRANCH}" --base main --state open --json number --jq '.[0].number // empty' 2>/dev/null || true)
          if [ -z "$EXISTING_PR" ]; then
            gh pr create \
              --title "chore: update ${SERVICE} translations" \
              --body "Auto-generated PR with updated translations from ${SERVICE}." \
              --head "${BRANCH}" \
              --base main \
              || echo "PR creation failed (may already exist)"
          else
            echo "PR #${EXISTING_PR} already exists for ${BRANCH}"
          fi
