# Retrieve SMART Guidelines translations from Weblate API
#
# Pulls the latest approved .po files via the Weblate REST API and commits
# them to the repository.  The repository is always the "puller" and stays
# in full control of when translated strings land in the codebase.
#
# All download / validation logic lives in:
#   input/scripts/pull_weblate_translations.py
#
# Required repository secret:
#   WEBLATE_API_TOKEN  — Weblate API token with at least read access.
#     Create:  https://hosted.weblate.org/accounts/profile/#api
#     Add:     Settings → Secrets and variables → Actions → New secret
#
# Weblate API docs: https://docs.weblate.org/en/latest/api.html

name: Pull Translations from Weblate

on:
  # ── Manual trigger from the GitHub Actions UI ──────────────────────────
  workflow_dispatch:
    inputs:
      weblate_url:
        description: 'Weblate base URL'
        required: false
        default: 'https://hosted.weblate.org'
      project_slug:
        description: 'Weblate project slug'
        required: false
        default: 'worldhealthorganization-smart-base'
      component:
        description: 'Component to pull (blank = all)'
        required: false
        default: ''
        type: choice
        options:
          - ''
          - fhir-resources
          - plantuml-diagrams
          - svg-images
          - archimate-models
          - uml-diagrams
      language:
        description: 'Language code to pull (blank = all 6 UN languages)'
        required: false
        default: ''
        type: choice
        options:
          - ''
          - ar
          - zh
          - fr
          - ru
          - es

  # ── Optional scheduled nightly pull ────────────────────────────────────
  # Uncomment to enable automatic nightly pulls:
  # schedule:
  #   - cron: '0 2 * * *'   # 02:00 UTC every day

concurrency:
  group: pull-translations
  cancel-in-progress: false

jobs:
  pull-translations:
    name: Pull .po files from Weblate API
    runs-on: ubuntu-latest

    permissions:
      contents: write   # required to commit .po files back to the branch

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: input/scripts/requirements.txt

      - name: Install Python dependencies
        run: pip install -r input/scripts/requirements.txt

      # ── All download logic is in the Python script ──────────────────────
      # User inputs are passed via environment variables, NEVER interpolated
      # directly into shell commands, to prevent script-injection attacks.
      - name: Download .po files from Weblate
        env:
          WEBLATE_API_TOKEN:  ${{ secrets.WEBLATE_API_TOKEN }}
          INPUT_WEBLATE_URL:  ${{ inputs.weblate_url }}
          INPUT_PROJECT:      ${{ inputs.project_slug }}
          INPUT_COMPONENT:    ${{ inputs.component }}
          INPUT_LANGUAGE:     ${{ inputs.language }}
        run: |
          python input/scripts/pull_weblate_translations.py \
            --weblate-url "${INPUT_WEBLATE_URL:-https://hosted.weblate.org}" \
            --project     "${INPUT_PROJECT:-worldhealthorganization-smart-base}" \
            --component   "${INPUT_COMPONENT:-}" \
            --language    "${INPUT_LANGUAGE:-}" \
            --output-root "."

      # ── Commit any updated .po files back to the branch ─────────────────
      - name: Commit updated translations
        env:
          ACTOR: ${{ github.actor }}
          INPUT_COMPONENT: ${{ inputs.component }}
          INPUT_LANGUAGE:  ${{ inputs.language }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Stage only translation .po files
          git add -- \
            'input/fsh/translations/' \
            'input/images-source/translations/' \
            'input/images/translations/' \
            'input/archimate/translations/' \
            'input/diagrams/translations/' \
            2>/dev/null || true

          if git diff --cached --quiet; then
            echo "No translation changes to commit."
          else
            TIMESTAMP=$(date -u '+%Y-%m-%d %H:%M UTC')
            MSG="chore: update translations from Weblate [${TIMESTAMP}]"$'\n\n'
            MSG+="Pulled via Weblate API by GitHub Actions."$'\n'
            MSG+="Triggered by: ${ACTOR}"$'\n'
            MSG+="Component filter: ${INPUT_COMPONENT:-all}"$'\n'
            MSG+="Language filter:  ${INPUT_LANGUAGE:-all}"
            git commit -m "$MSG"
            git push
          fi
