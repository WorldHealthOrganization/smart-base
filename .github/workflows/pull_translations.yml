# Retrieve SMART Guidelines translations from all active translation services.
#
# Pulls the latest approved .po files from every translation service that has
# a matching API token configured as a repository secret.  Service activation
# is entirely driven by secret presence — no code change is required to enable
# or disable a service.
#
# Supported services and their activation secrets:
#   Weblate   → WEBLATE_API_TOKEN
#   Launchpad → LAUNCHPAD_API_TOKEN
#   Crowdin   → CROWDIN_API_TOKEN
#
# Optional GPT fill-in for remaining untranslated strings:
#   OpenAI    → OPENAI_API_KEY
#   Anthropic → ANTHROPIC_API_KEY
#   DeepSeek  → DEEPSEEK_API_KEY
#
# All download / validation logic lives in:
#   input/scripts/pull_translations.py          (multi-service orchestrator)
#   input/scripts/pull_weblate_translations.py  (Weblate adapter)
#   input/scripts/pull_launchpad_translations.py
#   input/scripts/pull_crowdin_translations.py
#   input/scripts/pull_gpt_translations.py      (GPT fill-in pass)
#
# Translation service docs:
#   Weblate:    https://docs.weblate.org/en/latest/api.html
#   Crowdin:    https://developer.crowdin.com/api/v2/
#   Launchpad:  https://launchpad.net/+apidoc/devel.html

name: Pull Translations

on:
  # ── Manual trigger from the GitHub Actions UI ──────────────────────────
  workflow_dispatch:
    inputs:
      service:
        description: 'Translation service to pull from (blank = all active services)'
        required: false
        default: ''
        type: choice
        options:
          - ''
          - weblate
          - launchpad
          - crowdin
      weblate_url:
        description: 'Weblate base URL'
        required: false
        default: 'https://hosted.weblate.org'
      component:
        description: 'Component slug to pull (blank = all discovered components)'
        required: false
        default: ''
      language:
        description: 'Language code to pull (blank = all languages from dak.json)'
        required: false
        default: ''
        type: choice
        options:
          - ''
          - ar
          - zh
          - fr
          - ru
          - es
      skip_gpt:
        description: 'Skip GPT fill-in pass even if an AI key is available'
        required: false
        default: false
        type: boolean

  # ── Nightly automatic pull ──────────────────────────────────────────────
  schedule:
    - cron: '0 2 * * *'   # 02:00 UTC every day

concurrency:
  group: pull-translations
  cancel-in-progress: false

jobs:
  pull-translations:
    name: Pull .po files from translation services
    runs-on: ubuntu-latest

    permissions:
      contents: write   # required to commit .po files back to the branch

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # ── Gate all translation work on DAK being enabled ──────────────────
      - name: Check for DAK configuration
        id: dak_check
        run: |
          if [ -f "dak.json" ]; then
            echo "DAK_ENABLED=true" >> "$GITHUB_OUTPUT"
            echo "✅ dak.json found — translation pull is enabled"
          else
            echo "DAK_ENABLED=false" >> "$GITHUB_OUTPUT"
            echo "⚠️ dak.json not found — skipping translation pull (DAK not enabled)"
          fi

      - name: Set up Python
        if: steps.dak_check.outputs.DAK_ENABLED == 'true'
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: input/scripts/requirements.txt

      - name: Install Python dependencies
        if: steps.dak_check.outputs.DAK_ENABLED == 'true'
        run: pip install -r input/scripts/requirements.txt

      # ── All download logic is in the Python orchestrator ─────────────────
      # User inputs are passed via environment variables, NEVER interpolated
      # directly into shell commands, to prevent script-injection attacks.
      # Service tokens are passed via env: referencing GitHub secrets, never
      # as workflow_dispatch inputs.
      - name: Pull .po files from translation services
        if: steps.dak_check.outputs.DAK_ENABLED == 'true'
        env:
          # Service tokens — each service activates only when its token is set
          WEBLATE_API_TOKEN:    ${{ secrets.WEBLATE_API_TOKEN }}
          LAUNCHPAD_API_TOKEN:  ${{ secrets.LAUNCHPAD_API_TOKEN }}
          CROWDIN_API_TOKEN:    ${{ secrets.CROWDIN_API_TOKEN }}
          # GPT fill-in tokens
          OPENAI_API_KEY:       ${{ secrets.OPENAI_API_KEY }}
          ANTHROPIC_API_KEY:    ${{ secrets.ANTHROPIC_API_KEY }}
          DEEPSEEK_API_KEY:     ${{ secrets.DEEPSEEK_API_KEY }}
          # Context for project slug derivation
          GITHUB_REPOSITORY:    ${{ github.repository }}
        run: |
          # Build args array — filters are optional
          ARGS=(--repo-root ".")
          if [ -n "${{ inputs.service }}" ]; then
            ARGS+=(--service "${{ inputs.service }}")
          fi
          if [ -n "${{ inputs.weblate_url }}" ] && \
             [ "${{ inputs.weblate_url }}" != "https://hosted.weblate.org" ]; then
            ARGS+=(--weblate-url "${{ inputs.weblate_url }}")
          fi
          if [ -n "${{ inputs.component }}" ]; then
            ARGS+=(--component "${{ inputs.component }}")
          fi
          if [ -n "${{ inputs.language }}" ]; then
            ARGS+=(--language "${{ inputs.language }}")
          fi
          if [ "${{ inputs.skip_gpt }}" = "true" ]; then
            ARGS+=(--skip-gpt)
          fi
          python input/scripts/pull_translations.py "${ARGS[@]}"

      # ── Commit any updated .po files back to the branch ─────────────────
      # Stage all translation directories discovered dynamically.
      - name: Commit updated translations
        if: steps.dak_check.outputs.DAK_ENABLED == 'true'
        env:
          ACTOR:  ${{ github.actor }}
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          # Stage all .po files from every translations/ directory in the repo.
          # Using find so new components added by downstream repos are committed
          # automatically without needing to edit this workflow.
          while IFS= read -r -d '' dir; do
            git add -- "${dir}" 2>/dev/null || true
          done < <(find . -type d -name "translations" \
                    ! -path './.git/*' \
                    ! -path './fsh-generated/*' \
                    ! -path './output/*' \
                    ! -path './temp/*' \
                    -print0)

          if git diff --cached --quiet; then
            echo "No translation changes to commit."
          else
            TIMESTAMP=$(date -u '+%Y-%m-%d %H:%M UTC')
            MSG="chore: update translations [${TIMESTAMP}]"$'\n\n'
            MSG+="Pulled via translation services by GitHub Actions."$'\n'
            MSG+="Triggered by: ${ACTOR}"$'\n'
            MSG+="Service filter:   ${{ inputs.service || 'all' }}"$'\n'
            MSG+="Component filter: ${{ inputs.component || 'all' }}"$'\n'
            MSG+="Language filter:  ${{ inputs.language || 'all' }}"
            git commit -m "$MSG"
            git push
          fi
