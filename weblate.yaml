# weblate.yaml — SMART Base Weblate configuration
#
# This file configures Weblate (https://weblate.org) for the SMART Base
# Implementation Guide translation pipeline.
#
# Components are aligned with the WHO L3 Authoring SOP and the FHIR IG
# Publisher directory layout:
#   - FHIR-Resources   : FHIR FSH resource strings  (input/fsh/translations/)
#   - PlantUML-Diagrams: Sequence / component diagrams (input/images-source/translations/)
#   - SVG-Images       : Custom SVG diagrams          (input/images/translations/)
#   - ArchiMate-Models : ArchiMate architecture models (input/archimate/translations/)
#   - UML-Diagrams     : UML / class diagrams          (input/diagrams/translations/)
#
# Language codes follow BCP-47 / ISO 639-1 for the six UN official languages:
#   en (English), ar (Arabic), zh (Chinese), fr (French),
#   ru (Russian),  es (Spanish)
#
# Generated .po files are injected back into the diagram source files by
# input/scripts/inject_translations.py before the IG Publisher runs, so that
# rendered SVG diagrams contain localised text in the published GitHub Pages
# site at https://smart.who.int/base (or per-branch at
# https://worldhealthorganization.github.io/smart-base/branches/<branch>/).
#
# See input/scripts/extract_translations.py for how .pot templates are built.
# See input/scripts/inject_translations.py  for how translations are applied.

project:
  name: WorldHealthOrganization Smart-Base
  url: https://github.com/WorldHealthOrganization/smart-base
  web: https://smart.who.int/base/

components:

  # ── FHIR Resources (FSH) ────────────────────────────────────────────────
  # Translatable FHIR resource labels extracted from FSH source files.
  # Narrative pages are handled natively by the IG Publisher via directory
  # mirroring (input/pages/<lang>/) and are NOT managed here.
  - name: FHIR-Resources
    slug: fhir-resources
    repo: https://github.com/WorldHealthOrganization/smart-base
    push: https://github.com/WorldHealthOrganization/smart-base
    branch: main
    filemask: input/fsh/translations/*.po
    template: input/fsh/translations/base.pot
    new_base: input/fsh/translations/base.pot
    file_format: po
    vcs: git
    # Weblate screenshot / context: published IG root
    screenshot_url: https://smart.who.int/base/
    push_on_commit: false
    commit_pending_age: 24

  # ── PlantUML Diagrams ───────────────────────────────────────────────────
  # Sequence diagrams, component diagrams and other PlantUML sources.
  # .pot template is generated by extract_translations.py from
  # input/images-source/*.plantuml
  # Translated .plantuml files are output to input/images-source/<lang>/
  # and rendered to SVG by the IG Publisher before publication.
  - name: PlantUML-Diagrams
    slug: plantuml-diagrams
    repo: https://github.com/WorldHealthOrganization/smart-base
    push: https://github.com/WorldHealthOrganization/smart-base
    branch: main
    filemask: input/images-source/translations/*.po
    template: input/images-source/translations/diagrams.pot
    new_base: input/images-source/translations/diagrams.pot
    file_format: po
    vcs: git
    screenshot_url: https://smart.who.int/base/
    push_on_commit: false
    commit_pending_age: 24
    # Protect PlantUML reserved keywords from translation using check_flags.
    # Translators see these tokens as read-only widgets in the Weblate UI.
    check_flags: "placeholders:^@startuml|^@enduml|participant|control|entity|actor|boundary|database|collections|queue|skinparam"

  # ── Custom SVG Images ───────────────────────────────────────────────────
  # Hand-crafted SVG diagrams in input/images/.
  # .pot template is generated from SVG <text>, <title>, and <desc> elements.
  # Translated SVGs are written to input/images/<lang>/ by inject_translations.py.
  - name: SVG-Images
    slug: svg-images
    repo: https://github.com/WorldHealthOrganization/smart-base
    push: https://github.com/WorldHealthOrganization/smart-base
    branch: main
    filemask: input/images/translations/*.po
    template: input/images/translations/images.pot
    new_base: input/images/translations/images.pot
    file_format: po
    vcs: git
    screenshot_url: https://smart.who.int/base/
    push_on_commit: false
    commit_pending_age: 24

  # ── ArchiMate Architecture Models ───────────────────────────────────────
  # Archi / Open Exchange XML files in input/archimate/.
  # .pot template is generated from <name>, <documentation>, and <label>
  # elements in the ArchiMate Open Exchange Format.
  - name: ArchiMate-Models
    slug: archimate-models
    repo: https://github.com/WorldHealthOrganization/smart-base
    push: https://github.com/WorldHealthOrganization/smart-base
    branch: main
    filemask: input/archimate/translations/*.po
    template: input/archimate/translations/models.pot
    new_base: input/archimate/translations/models.pot
    file_format: po
    vcs: git
    screenshot_url: https://smart.who.int/base/
    push_on_commit: false
    commit_pending_age: 24

  # ── UML / Class Diagrams ─────────────────────────────────────────────────
  # SVG and XML diagram outputs from the FHIR Class Diagrammer in input/diagrams/.
  - name: UML-Diagrams
    slug: uml-diagrams
    repo: https://github.com/WorldHealthOrganization/smart-base
    push: https://github.com/WorldHealthOrganization/smart-base
    branch: main
    filemask: input/diagrams/translations/*.po
    template: input/diagrams/translations/diagrams.pot
    new_base: input/diagrams/translations/diagrams.pot
    file_format: po
    vcs: git
    screenshot_url: https://smart.who.int/base/
    push_on_commit: false
    commit_pending_age: 24

# ── Quality Control Workflow ─────────────────────────────────────────────
workflow:
  # Require approval from an SME Reviewer before a translation is accepted.
  approval_required: true
  # Allow community voting on translation suggestions.
  suggestion_voting: true
  # Enable machine translation pre-fill via LibreTranslate (self-hosted or
  # the public instance at https://libretranslate.com).
  machine_translation:
    - service: libretranslate

# ── Language Configuration ───────────────────────────────────────────────
# Six UN official languages with Gettext plural forms.
languages:
  - code: fr
    name: French
    direction: ltr
    plural: "nplurals=2; plural=(n > 1);"
  - code: ar
    name: Arabic
    # Right-to-left: inject_translations.py adds dir="rtl" to SVG containers.
    direction: rtl
    plural: "nplurals=6; plural=(n==0 ? 0 : n==1 ? 1 : n==2 ? 2 : n%100>=3 && n%100<=10 ? 3 : n%100>=11 && n%100<=99 ? 4 : 5);"
  - code: zh
    name: Chinese (Simplified)
    direction: ltr
    plural: "nplurals=1; plural=0;"
  - code: ru
    name: Russian
    direction: ltr
    plural: "nplurals=3; plural=(n%10==1 && n%100!=11 ? 0 : n%10>=2 && n%10<=4 && (n%100<10 || n%100>=20) ? 1 : 2);"
  - code: es
    name: Spanish
    direction: ltr
    plural: "nplurals=2; plural=(n != 1);"
